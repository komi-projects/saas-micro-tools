<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shareable Result Card — SaaS Micro Tools</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f172a;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  padding: 40px;
}
.card {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border: 1px solid #334155;
  border-radius: 16px;
  padding: 32px;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.logo {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.title {
  color: #f8fafc;
  font-size: 18px;
  font-weight: 700;
}
.subtitle {
  color: #94a3b8;
  font-size: 13px;
}
.result-box {
  background: rgba(245, 158, 11, 0.1);
  border: 1px solid rgba(245, 158, 11, 0.3);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  margin-bottom: 20px;
}
.result-label {
  color: #fbbf24;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.result-value {
  color: #f8fafc;
  font-size: 36px;
  font-weight: 800;
  margin-bottom: 4px;
}
.result-context {
  color: #94a3b8;
  font-size: 14px;
}
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 16px;
  border-top: 1px solid #334155;
}
.brand {
  color: #64748b;
  font-size: 12px;
}
.brand a {
  color: #fbbf24;
  text-decoration: none;
}
.cta {
  background: #f59e0b;
  color: #0f172a;
  padding: 8px 16px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  text-decoration: none;
}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="header">
    <div class="logo" id="emoji">📊</div>
    <div>
      <div class="title" id="toolName">SaaS Calculator</div>
      <div class="subtitle" id="toolDesc">Calculate your metrics</div>
    </div>
  </div>
  <div class="result-box">
    <div class="result-label" id="resultLabel">Result</div>
    <div class="result-value" id="resultValue">$12,400</div>
    <div class="result-context" id="resultContext">Recovered this month</div>
  </div>
  <div class="footer">
    <div class="brand">via <a href="https://komi-projects.github.io/saas-micro-tools/">SaaS Micro Tools</a></div>
    <a class="cta" href="https://komi-projects.github.io/saas-micro-tools/" id="ctaLink">Try it →</a>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const tool = params.get('tool') || 'SaaS Calculator';
const emoji = params.get('emoji') || '📊';
const desc = params.get('desc') || 'Calculate your metrics';
const label = params.get('label') || 'Result';
const value = params.get('value') || '$12,400';
const context = params.get('context') || 'Recovered this month';
const url = params.get('url') || 'https://komi-projects.github.io/saas-micro-tools/';

document.getElementById('toolName').textContent = tool;
document.getElementById('emoji').textContent = emoji;
document.getElementById('toolDesc').textContent = desc;
document.getElementById('resultLabel').textContent = label;
document.getElementById('resultValue').textContent = value;
document.getElementById('resultContext').textContent = context;
document.getElementById('ctaLink').href = url;
document.querySelector('.brand a').href = url;
</script>

<div style="text-align:center;margin-top:40px;padding:24px;background:#1a1a2e;border-radius:12px;border:1px solid rgba(255,255,255,0.05)">
  <p style="color:#94a3b8;margin-bottom:16px;font-size:0.95rem">Found this useful? Share it →</p>
  <a id="twitterShare" href="#" target="_blank" style="display:inline-block;padding:12px 24px;background:#1da1f2;color:#fff;text-decoration:none;border-radius:8px;font-weight:600;margin-right:12px;font-size:0.9rem">
    Share on 𝕏
  </a>
  <button onclick="copyLink()" style="padding:12px 24px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:0.9rem">
    Copy Link
  </button>
  <p id="copyMsg" style="color:#10b981;margin-top:12px;font-size:0.85rem;display:none">✓ Link copied!</p>
</div>
<div style="text-align:center;margin-top:32px;padding:20px;border-top:1px solid rgba(255,255,255,0.05)">
  <p style="color:#64748b;font-size:0.85rem">Powered by <a href="https://simplerecover.com" style="color:#818cf8;text-decoration:none;font-weight:600">SimpleRecover</a> — Stripe payment recovery for SaaS</p>
</div>
<script>
(function(){
  var pageTitle = document.title.replace(/—.*$/, '').trim();
  var pageUrl = window.location.href;
  var shareText = encodeURIComponent('Just used this free ' + pageTitle + ' — check it out: ' + pageUrl + ' #SaaS #metrics');
  var twitterBtn = document.getElementById('twitterShare');
  if (twitterBtn) {
    twitterBtn.href = 'https://twitter.com/intent/tweet?text=' + shareText;
  }
})();
function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(function() {
    var msg = document.getElementById('copyMsg');
    if (msg) { msg.style.display = 'block'; setTimeout(function(){ msg.style.display = 'none'; }, 2000); }
  });
}
</script>

</body>
</html>
