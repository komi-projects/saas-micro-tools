<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS MRR Calculator — Monthly Recurring Revenue</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f8fafc;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            margin-top: 24px;
            display: none;
        }
        .result.active {
            display: block;
        }
        .result-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-detail {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .cta {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        @media (max-width: 600px) {
            .container { padding: 24px; }
            .result-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SaaS MRR Calculator</h1>
        <p class="subtitle">Calculate your Monthly Recurring Revenue</p>

        <div class="input-group">
            <label>Number of Customers</label>
            <input type="number" id="customers" placeholder="100" value="100">
        </div>

        <div class="input-group">
            <label>Average Revenue Per User ($/mo)</label>
            <input type="number" id="arpu" placeholder="50" value="50">
        </div>

        <div class="input-group">
            <label>Annual Plan Discount (%)</label>
            <input type="number" id="discount" placeholder="20" value="20">
        </div>

        <button class="cta" onclick="calculate()">Calculate MRR</button>

        <div class="result" id="result">
            <div class="result-label">Monthly Recurring Revenue</div>
            <div class="result-value" id="mrr">$0</div>
            <div class="result-detail" id="detail">Annual equivalent: $0</div>
        </div>
    </div>

    <script>
        function calculate() {
            const customers = parseFloat(document.getElementById('customers').value) || 0;
            const arpu = parseFloat(document.getElementById('arpu').value) || 0;
            const discount = parseFloat(document.getElementById('discount').value) || 0;

            const mrr = customers * arpu;
            const annual = mrr * 12;

            document.getElementById('mrr').textContent = '$' + Math.round(mrr).toLocaleString();
            document.getElementById('detail').textContent = 
                'Annual equivalent: $' + Math.round(annual).toLocaleString() +
                ' • ARPU: $' + arpu + '/mo';
            document.getElementById('result').classList.add('active');
        }
    </script>

<div style="text-align:center;margin-top:40px;padding:24px;background:#1a1a2e;border-radius:12px;border:1px solid rgba(255,255,255,0.05)">
  <p style="color:#94a3b8;margin-bottom:16px;font-size:0.95rem">Found this useful? Share it →</p>
  <a id="twitterShare" href="#" target="_blank" style="display:inline-block;padding:12px 24px;background:#1da1f2;color:#fff;text-decoration:none;border-radius:8px;font-weight:600;margin-right:12px;font-size:0.9rem">
    Share on 𝕏
  </a>
  <button onclick="copyLink()" style="padding:12px 24px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:0.9rem">
    Copy Link
  </button>
  <p id="copyMsg" style="color:#10b981;margin-top:12px;font-size:0.85rem;display:none">✓ Link copied!</p>
</div>
<div style="text-align:center;margin-top:32px;padding:20px;border-top:1px solid rgba(255,255,255,0.05)">
  <p style="color:#64748b;font-size:0.85rem">Powered by <a href="https://simplerecover.com" style="color:#818cf8;text-decoration:none;font-weight:600">SimpleRecover</a> — Stripe payment recovery for SaaS</p>
</div>
<script>
(function(){
  var pageTitle = document.title.replace(/—.*$/, '').trim();
  var pageUrl = window.location.href;
  var shareText = encodeURIComponent('Just used this free ' + pageTitle + ' — check it out: ' + pageUrl + ' #SaaS #metrics');
  var twitterBtn = document.getElementById('twitterShare');
  if (twitterBtn) {
    twitterBtn.href = 'https://twitter.com/intent/tweet?text=' + shareText;
  }
})();
function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(function() {
    var msg = document.getElementById('copyMsg');
    if (msg) { msg.style.display = 'block'; setTimeout(function(){ msg.style.display = 'none'; }, 2000); }
  });
}
</script>

</body>
</html>
