<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS API Rate Limit Calculator — Plan Your Infrastructure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-blue-500 via-cyan-500 to-teal-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">⚡ API Rate Limit Calculator</h1>
            <p class="opacity-90">Calculate how many API requests your users can make before hitting limits.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Active Users</label>
                    <input type="number" id="users" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500" placeholder="1000" value="1000">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Actions per User / Hour</label>
                    <input type="number" id="actions" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500" placeholder="10" value="10">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">API Calls per Action</label>
                    <input type="number" id="callsPerAction" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500" placeholder="3" value="3">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Rate Limit (requests / minute)</label>
                    <input type="number" id="rateLimit" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500" placeholder="1000" value="1000">
                </div>
            </div>

            <button onclick="calculateRateLimit()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Calculate Rate Limit →</button>

            <div id="output" class="mt-8 hidden space-y-6">
                <div class="grid md:grid-cols-3 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Requests / Minute</div>
                        <div class="text-3xl font-bold text-cyan-600" id="rpm"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Headroom</div>
                        <div class="text-3xl font-bold" id="headroom"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Status</div>
                        <div class="text-xl font-bold" id="status"></div>
                    </div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-3">Recommendations</h3>
                    <ul class="space-y-2 text-sm text-gray-600" id="recs"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateRateLimit() {
            const users = parseFloat(document.getElementById('users').value);
            const actions = parseFloat(document.getElementById('actions').value);
            const callsPerAction = parseFloat(document.getElementById('callsPerAction').value);
            const rateLimit = parseFloat(document.getElementById('rateLimit').value);

            const rpm = Math.round((users * actions * callsPerAction) / 60);
            const headroom = rateLimit - rpm;
            const pct = ((rpm / rateLimit) * 100).toFixed(0);

            document.getElementById('rpm').textContent = rpm.toLocaleString();
            document.getElementById('headroom').textContent = headroom.toLocaleString();
            document.getElementById('headroom').className = 'text-3xl font-bold ' + (headroom > 0 ? 'text-green-600' : 'text-red-600');
            
            document.getElementById('status').textContent = headroom > 0 ? 'Safe ✅' : 'Over Limit 🚨';
            document.getElementById('status').className = 'text-xl font-bold ' + (headroom > 0 ? 'text-green-600' : 'text-red-600');

            const recs = [];
            if (headroom < 0) recs.push('🚨 You are ' + Math.abs(headroom) + ' requests/min over your rate limit.');
            if (headroom < rateLimit * 0.2) recs.push('⚠️ Headroom is tight. Consider upgrading your plan or caching more aggressively.');
            if (headroom > rateLimit * 0.5) recs.push('✅ Good headroom. You can grow 2x before hitting the limit.');
            recs.push('💡 Add client-side caching to reduce API calls by 40-60%.');
            recs.push('💡 Implement request batching: combine multiple operations into one call.');

            document.getElementById('recs').innerHTML = recs.map(r => `<li>${r}</li>`).join('');
            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
