<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Cohort Retention Analyzer — Track Churn by Cohort</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-blue-500 via-cyan-500 to-teal-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">📊 SaaS Cohort Retention Analyzer</h1>
            <p class="opacity-90">Track how each customer cohort retains over time.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Number of Cohorts (months)</label>
                <input type="number" id="cohorts" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="6" value="6">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Customers per Cohort</label>
                <input type="number" id="customers" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="100" value="100">
            </div>

            <button onclick="generateCohorts()" class="w-full py-3 bg-gradient-to-r from-blue-500 to-cyan-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Cohort Table →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-4">Monthly Cohort Retention</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm" id="cohortTable">
                            <thead><tr class="border-b-2 border-gray-200">
                                <th class="text-left py-2">Cohort</th>
                                <th class="text-center py-2">Month 0</th>
                                <th class="text-center py-2">Month 1</th>
                                <th class="text-center py-2">Month 2</th>
                                <th class="text-center py-2">Month 3</th>
                                <th class="text-center py-2">Month 4</th>
                                <th class="text-center py-2">Month 5</th>
                                <th class="text-center py-2">Month 6</th>
                            </tr></thead>
                            <tbody id="cohortBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateCohorts() {
            const numCohorts = parseInt(document.getElementById('cohorts').value);
            const customers = parseInt(document.getElementById('customers').value);
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const now = new Date();
            let html = '';
            
            for (let i = 0; i < numCohorts; i++) {
                const monthIdx = (now.getMonth() - i + 12) % 12;
                const year = now.getFullYear() - (now.getMonth() - i < 0 ? 1 : 0);
                const cohortName = `${months[monthIdx]} ${year}`;
                
                html += `<tr class="border-b"><td class="py-2 font-medium">${cohortName}</td>`;
                
                // Retention drops roughly 5-8% per month for SaaS
                for (let m = 0; m <= 6; m++) {
                    const retention = m === 0 ? 100 : Math.max(100 - (m * (5 + Math.random() * 3)), 10);
                    const color = retention > 80 ? 'text-green-600' : retention > 50 ? 'text-yellow-600' : 'text-red-600';
                    const customersRemaining = Math.round(customers * retention / 100);
                    html += `<td class="text-center py-2 ${color}">${customersRemaining} (${retention.toFixed(0)}%)</td>`;
                }
                html += '</tr>';
            }
            
            document.getElementById('cohortBody').innerHTML = html;
            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
