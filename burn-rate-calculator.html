<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Burn Rate Calculator — Monthly Cash Burn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f8fafc;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            margin-top: 24px;
            display: none;
        }
        .result.active {
            display: block;
        }
        .result-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-detail {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .cta {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        @media (max-width: 600px) {
            .container { padding: 24px; }
            .result-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SaaS Burn Rate Calculator</h1>
        <p class="subtitle">Calculate your monthly cash burn</p>

        <div class="input-group">
            <label>Starting Cash ($)</label>
            <input type="number" id="cash" placeholder="100000" value="100000">
        </div>

        <div class="input-group">
            <label>Monthly Revenue ($)</label>
            <input type="number" id="revenue" placeholder="5000" value="5000">
        </div>

        <div class="input-group">
            <label>Monthly Expenses ($)</label>
            <input type="number" id="expenses" placeholder="15000" value="15000">
        </div>

        <button class="cta" onclick="calculate()">Calculate Burn Rate</button>

        <div class="result" id="result">
            <div class="result-label">Monthly Burn Rate</div>
            <div class="result-value" id="burn">$0</div>
            <div class="result-detail" id="detail">Months of runway: 0</div>
        </div>
    </div>

    <script>
        function calculate() {
            const cash = parseFloat(document.getElementById('cash').value) || 0;
            const revenue = parseFloat(document.getElementById('revenue').value) || 0;
            const expenses = parseFloat(document.getElementById('expenses').value) || 0;

            const burn = expenses - revenue;
            const runway = burn > 0 ? cash / burn : '∞';

            document.getElementById('burn').textContent = '$' + Math.round(burn).toLocaleString();
            document.getElementById('detail').textContent = 'Months of runway: ' + 
                (runway === '∞' ? '∞ (profitable)' : Math.round(runway));
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
</html>
