<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Weekly Planning Template — Plan Your Week Like a Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-amber-500 via-orange-500 to-red-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">📅 Weekly Planning Template</h1>
            <p class="opacity-90">Plan your week with focus blocks, metrics, and priorities.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="space-y-6">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Week Of</label>
                        <input type="date" id="weekDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Focus Theme</label>
                        <input type="text" id="theme" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" placeholder="Launch pricing page">
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-4">
                    <div class="bg-red-50 p-4 rounded-xl">
                        <h3 class="font-semibold text-red-700 mb-2">🔴 Must Do (3 max)</h3>
                        <textarea id="mustDo" class="w-full h-24 px-3 py-2 border border-red-200 rounded-lg text-sm" placeholder="1. Launch pricing page
2. Fix onboarding bug
3. Send newsletter"></textarea>
                    </div>
                    <div class="bg-yellow-50 p-4 rounded-xl">
                        <h3 class="font-semibold text-yellow-700 mb-2">🟡 Should Do (5 max)</h3>
                        <textarea id="shouldDo" class="w-full h-24 px-3 py-2 border border-yellow-200 rounded-lg text-sm" placeholder="1. Write blog post
2. Update docs
3. Review analytics"></textarea>
                    </div>
                    <div class="bg-green-50 p-4 rounded-xl">
                        <h3 class="font-semibold text-green-700 mb-2">🟢 Nice to Have</h3>
                        <textarea id="niceDo" class="w-full h-24 px-3 py-2 border border-green-200 rounded-lg text-sm" placeholder="1. Redesign logo
2. Experiment with new feature"></textarea>
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl">
                        <h3 class="font-semibold mb-2">📊 Metrics to Track</h3>
                        <textarea id="metrics" class="w-full h-20 px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="MRR, Churn, Signups"></textarea>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl">
                        <h3 class="font-semibold mb-2">🚧 Blockers</h3>
                        <textarea id="blockers" class="w-full h-20 px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="Waiting for designer, API rate limits"></textarea>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl">
                        <h3 class="font-semibold mb-2">🎉 Wins from Last Week</h3>
                        <textarea id="wins" class="w-full h-20 px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="Shipped 2 features, got 10 signups"></textarea>
                    </div>
                </div>
            </div>

            <button onclick="downloadPlan()" class="mt-6 w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Download as Markdown →</button>
        </div>
    </div>

    <script>
        function downloadPlan() {
            const date = document.getElementById('weekDate').value;
            const theme = document.getElementById('theme').value;
            const must = document.getElementById('mustDo').value;
            const should = document.getElementById('shouldDo').value;
            const nice = document.getElementById('niceDo').value;
            const metrics = document.getElementById('metrics').value;
            const blockers = document.getElementById('blockers').value;
            const wins = document.getElementById('wins').value;

            const markdown = `# Weekly Plan — ${date || 'Week of'}

**Theme:** ${theme || 'Not set'}

## 🔴 Must Do (3 max)
${must || '- '}

## 🟡 Should Do (5 max)
${should || '- '}

## 🟢 Nice to Have
${nice || '- '}

## 📊 Metrics to Track
${metrics || '- '}

## 🚧 Blockers
${blockers || '- '}

## 🎉 Wins from Last Week
${wins || '- '}
`;

            const blob = new Blob([markdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `weekly-plan-${date || 'week'}.md`;
            a.click();
        }
    </script>
</body>
</html>
