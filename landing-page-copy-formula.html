<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Landing Page Copy Formula — Write Copy That Converts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-violet-500 via-purple-500 to-fuchsia-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">✍️ SaaS Landing Page Copy Formula</h1>
            <p class="opacity-90">Fill in the blanks to generate high-converting landing page copy.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your product name</label>
                    <input type="text" id="productName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="SimpleRecover" value="SimpleRecover">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">What it does (verb)</label>
                    <input type="text" id="productDoes" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="recovers failed payments" value="recovers failed payments">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Target audience</label>
                    <input type="text" id="audience" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="SaaS founders" value="SaaS founders">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Key benefit with number</label>
                    <input type="text" id="benefit" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="reduce churn by 30%" value="reduce churn by 30%">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Pain point</label>
                    <input type="text" id="pain" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="losing revenue to failed payments" value="losing revenue to failed payments">
                </div>
            </div>

            <button onclick="generateCopy()" class="w-full py-3 bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Copy →</button>

            <div id="output" class="mt-8 hidden space-y-6">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="text-sm font-medium text-gray-500 mb-2">Hero Section:</div>
                    <div class="space-y-2 text-gray-700">
                        <div class="text-2xl font-bold" id="heroHeadline"></div>
                        <div class="text-lg" id="heroSubheadline"></div>
                        <div class="inline-block px-6 py-3 bg-purple-600 text-white rounded-lg font-semibold" id="heroCTA"></div>
                    </div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="text-sm font-medium text-gray-500 mb-2">Social Proof:</div>
                    <div class="text-gray-700" id="socialProof"></div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="text-sm font-medium text-gray-500 mb-2">Problem Section:</div>
                    <div class="text-gray-700" id="problemSection"></div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="text-sm font-medium text-gray-500 mb-2">Solution Section:</div>
                    <div class="text-gray-700" id="solutionSection"></div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="text-sm font-medium text-gray-500 mb-2">CTA Section:</div>
                    <div class="text-gray-700" id="ctaSection"></div>
                </div>

                <button onclick="copyAll()" class="w-full py-3 bg-purple-600 text-white rounded-lg font-semibold hover:bg-purple-700 transition">Copy All Copy</button>
            </div>
        </div>
    </div>

    <script>
        function generateCopy() {
            const name = document.getElementById('productName').value;
            const does = document.getElementById('productDoes').value;
            const audience = document.getElementById('audience').value;
            const benefit = document.getElementById('benefit').value;
            const pain = document.getElementById('pain').value;

            document.getElementById('heroHeadline').textContent = `Stop ${pain.charAt(0).toUpperCase() + pain.slice(1)}. ${name} ${does} automatically.`;
            document.getElementById('heroSubheadline').textContent = `Built for ${audience} who want to ${benefit} without the engineering overhead.`;
            document.getElementById('heroCTA').textContent = 'Start Free Trial →';

            document.getElementById('socialProof').textContent = `"${name} recovered $12K in our first month." — CEO, TechStart`;

            document.getElementById('problemSection').textContent = `Every month, ${audience} lose thousands to ${pain}. Manual retries don't work. Spreadsheets don't scale. And by the time you notice, the customer is gone.`;

            document.getElementById('solutionSection').textContent = `${name} integrates with Stripe in 5 minutes. Set your retry rules once. Let it run forever. Watch your recovery rate climb.`;

            document.getElementById('ctaSection').textContent = `Join 500+ ${audience} who stopped ${pain}. Start your free trial today — no credit card required.`;

            document.getElementById('output').classList.remove('hidden');
        }

        function copyAll() {
            const sections = ['heroHeadline', 'heroSubheadline', 'heroCTA', 'socialProof', 'problemSection', 'solutionSection', 'ctaSection'];
            const text = sections.map(id => document.getElementById(id).textContent).join('\n\n');
            navigator.clipboard.writeText(text);
            alert('All copy copied!');
        }
    </script>
</body>
</html>
