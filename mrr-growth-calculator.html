<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRR Growth Calculator — Project Your Revenue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-teal-500 via-emerald-500 to-green-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">📈 MRR Growth Calculator</h1>
            <p class="opacity-90">Project your Monthly Recurring Revenue with growth, churn, and expansion.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Current MRR ($)</label>
                    <input type="number" id="mrr" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="10000" value="10000">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New Customers/Month</label>
                    <input type="number" id="newCustomers" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="20" value="20">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ARPU ($)</label>
                    <input type="number" id="arpu" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="50" value="50">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Churn (%)</label>
                    <input type="number" id="churn" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="5" value="5">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Expansion Revenue (%)</label>
                    <input type="number" id="expansion" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="2" value="2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Months to Project</label>
                    <input type="number" id="months" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="12" value="12">
                </div>
            </div>

            <button onclick="calculate()" class="w-full py-3 bg-gradient-to-r from-teal-500 to-emerald-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Project MRR →</button>

            <div id="output" class="mt-8 hidden">
                <div class="grid md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-teal-50 p-4 rounded-xl border-l-4 border-teal-500">
                        <div class="text-sm text-gray-600 mb-1">Projected MRR</div>
                        <div class="text-2xl font-bold text-teal-700" id="projectedMrr">$0</div>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-xl border-l-4 border-emerald-500">
                        <div class="text-sm text-gray-600 mb-1">Total Growth</div>
                        <div class="text-2xl font-bold text-emerald-700" id="totalGrowth">0%</div>
                    </div>
                    <div class="bg-green-50 p-4 rounded-xl border-l-4 border-green-500">
                        <div class="text-sm text-gray-600 mb-1">ARR at End</div>
                        <div class="text-2xl font-bold text-green-700" id="projectedArr">$0</div>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl">
                    <h3 class="font-semibold mb-3">Month-by-Month Projection:</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="border-b">
                                    <th class="text-left py-2">Month</th>
                                    <th class="text-right py-2">MRR</th>
                                    <th class="text-right py-2">New Rev</th>
                                    <th class="text-right py-2">Churned</th>
                                    <th class="text-right py-2">Expansion</th>
                                    <th class="text-right py-2">Net</th>
                                </tr>
                            </thead>
                            <tbody id="projectionTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            let mrr = parseFloat(document.getElementById('mrr').value) || 0;
            const newCustomers = parseFloat(document.getElementById('newCustomers').value) || 0;
            const arpu = parseFloat(document.getElementById('arpu').value) || 0;
            const churn = parseFloat(document.getElementById('churn').value) || 0;
            const expansion = parseFloat(document.getElementById('expansion').value) || 0;
            const months = parseFloat(document.getElementById('months').value) || 12;

            const startingMrr = mrr;
            let tableHtml = '';

            for (let month = 1; month <= months; month++) {
                const newRev = newCustomers * arpu;
                const churnedRev = mrr * (churn / 100);
                const expansionRev = mrr * (expansion / 100);
                const net = newRev - churnedRev + expansionRev;
                mrr += net;

                tableHtml += `
                    <tr class="border-b border-gray-200">
                        <td class="py-2">${month}</td>
                        <td class="text-right font-bold">$${mrr.toFixed(0)}</td>
                        <td class="text-right text-green-600">+$${newRev.toFixed(0)}</td>
                        <td class="text-right text-red-600">-$${churnedRev.toFixed(0)}</td>
                        <td class="text-right text-blue-600">+$${expansionRev.toFixed(0)}</td>
                        <td class="text-right ${net >= 0 ? 'text-green-600' : 'text-red-600'}">$${net.toFixed(0)}</td>
                    </tr>
                `;
            }

            const totalGrowth = ((mrr - startingMrr) / startingMrr * 100).toFixed(0);

            document.getElementById('projectedMrr').textContent = '$' + mrr.toLocaleString('en-US', { maximumFractionDigits: 0 });
            document.getElementById('totalGrowth').textContent = totalGrowth + '%';
            document.getElementById('projectedArr').textContent = '$' + (mrr * 12).toLocaleString('en-US', { maximumFractionDigits: 0 });
            document.getElementById('projectionTable').innerHTML = tableHtml;
            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
