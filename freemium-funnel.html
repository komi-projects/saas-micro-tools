<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Freemium Conversion Funnel — Optimize Your Free-to-Paid Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-cyan-500 via-blue-500 to-indigo-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">🔄 Freemium Conversion Funnel</h1>
            <p class="opacity-90">Optimize your free-to-paid conversion flow and identify drop-off points.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Free Users (monthly)</label>
                    <input type="number" id="freeUsers" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500" placeholder="10000" value="10000">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Trial Starters (% of free)</label>
                    <input type="number" id="trialRate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500" placeholder="15" value="15">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Trial-to-Paid Conversion (%)</label>
                    <input type="number" id="trialToPaid" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500" placeholder="25" value="25">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Average Paid Plan ($/month)</label>
                    <input type="number" id="avgPlan" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500" placeholder="49" value="49">
                </div>
            </div>

            <button onclick="calculateFunnel()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Analyze Funnel →</button>

            <div id="output" class="mt-8 hidden space-y-6">
                <div class="grid md:grid-cols-3 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Overall Conversion Rate</div>
                        <div class="text-3xl font-bold" id="overallConversion"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">New MRR from Free Users</div>
                        <div class="text-xl font-bold text-green-600" id="newMrr"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Drop-Off Points</div>
                        <div class="text-xl font-bold text-red-600" id="dropOffs"></div>
                    </div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-3">Funnel Visualization</h3>
                    <div class="space-y-3" id="funnelViz"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateFunnel() {
            const freeUsers = parseFloat(document.getElementById('freeUsers').value);
            const trialRate = parseFloat(document.getElementById('trialRate').value) / 100;
            const trialToPaid = parseFloat(document.getElementById('trialToPaid').value) / 100;
            const avgPlan = parseFloat(document.getElementById('avgPlan').value);

            const trialStarters = freeUsers * trialRate;
            const paidUsers = trialStarters * trialToPaid;
            const overallConv = (paidUsers / freeUsers * 100).toFixed(2);
            const newMrr = paidUsers * avgPlan;

            document.getElementById('overallConversion').textContent = overallConv + '%';
            document.getElementById('overallConversion').className = 'text-3xl font-bold ' + (overallConv >= 3 ? 'text-green-600' : overallConv >= 1 ? 'text-yellow-600' : 'text-red-600');
            document.getElementById('newMrr').textContent = '$' + Math.round(newMrr).toLocaleString();
            document.getElementById('dropOffs').textContent = Math.round(freeUsers - paidUsers).toLocaleString() + ' users lost';

            const funnelHtml = `
                <div class="flex items-center justify-between">
                    <span>Free Users</span>
                    <div class="flex-1 mx-4 h-8 bg-blue-200 rounded" style="width: 100%"></div>
                    <span class="font-medium">${freeUsers.toLocaleString()}</span>
                </div>
                <div class="flex items-center justify-between">
                    <span>Trial Starters</span>
                    <div class="flex-1 mx-4 h-8 bg-cyan-200 rounded" style="width: ${trialRate * 100}%"></div>
                    <span class="font-medium">${Math.round(trialStarters).toLocaleString()} (${(trialRate * 100).toFixed(0)}%)</span>
                </div>
                <div class="flex items-center justify-between">
                    <span>Paid Conversions</span>
                    <div class="flex-1 mx-4 h-8 bg-green-200 rounded" style="width: ${overallConv}%"></div>
                    <span class="font-medium">${Math.round(paidUsers).toLocaleString()} (${overallConv}%)</span>
                </div>
            `;
            document.getElementById('funnelViz').innerHTML = funnelHtml;
            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
