<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Pricing Analysis — Compare & Win</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-cyan-500 via-teal-500 to-emerald-500 min-h-screen py-10 px-4">
    <div class="max-w-5xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">⚔️ Competitive Pricing Analysis</h1>
            <p class="opacity-90">Compare your pricing against competitors and find your position.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-3 gap-4 mb-6">
                <div class="p-4 bg-gray-50 rounded-xl">
                    <div class="font-semibold text-gray-700 mb-2">Your Product</div>
                    <input type="text" id="yourProduct" class="w-full px-3 py-2 border border-gray-300 rounded-lg mb-2" placeholder="MyApp" value="MyApp">
                    <input type="number" id="yourPrice" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="29" value="29">
                </div>
                <div class="p-4 bg-gray-50 rounded-xl">
                    <div class="font-semibold text-gray-700 mb-2">Competitor A</div>
                    <input type="text" id="compA" class="w-full px-3 py-2 border border-gray-300 rounded-lg mb-2" placeholder="Competitor X" value="Competitor X">
                    <input type="number" id="compAPrice" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="49" value="49">
                </div>
                <div class="p-4 bg-gray-50 rounded-xl">
                    <div class="font-semibold text-gray-700 mb-2">Competitor B</div>
                    <input type="text" id="compB" class="w-full px-3 py-2 border border-gray-300 rounded-lg mb-2" placeholder="Competitor Y" value="Competitor Y">
                    <input type="number" id="compBPrice" class="w-full px-3 py-2 border border-gray-300 rounded-lg" placeholder="19" value="19">
                </div>
            </div>

            <button onclick="analyze()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-emerald-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Analyze Pricing →</button>

            <div id="output" class="mt-8 hidden space-y-6">
                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-4">Price Positioning</h3>
                    <div class="relative h-8 bg-gray-200 rounded-full overflow-hidden mb-2">
                        <div id="priceBar" class="absolute top-0 h-full bg-gradient-to-r from-cyan-500 to-emerald-500 transition-all" style="left: 0%; width: 0%"></div>
                        <div id="yourMarker" class="absolute top-0 w-1 h-full bg-red-500 transition-all" style="left: 0%"></div>
                    </div>
                    <div class="flex justify-between text-xs text-gray-500">
                        <span>Lowest: <span id="lowestLabel"></span></span>
                        <span>Highest: <span id="highestLabel"></span></span>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl">
                        <div class="text-sm font-medium text-gray-500">Your Position</div>
                        <div class="text-2xl font-bold text-gray-800" id="positionText"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl">
                        <div class="text-sm font-medium text-gray-500">Price Gap vs. Average</div>
                        <div class="text-2xl font-bold" id="gapText"></div>
                    </div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-3">Recommendations</h3>
                    <ul class="space-y-2 text-sm text-gray-600" id="recommendations"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function analyze() {
            const yourPrice = parseInt(document.getElementById('yourPrice').value);
            const compAPrice = parseInt(document.getElementById('compAPrice').value);
            const compBPrice = parseInt(document.getElementById('compBPrice').value);

            const prices = [
                { name: document.getElementById('yourProduct').value, price: yourPrice, isYou: true },
                { name: document.getElementById('compA').value, price: compAPrice, isYou: false },
                { name: document.getElementById('compB').value, price: compBPrice, isYou: false }
            ];

            const min = Math.min(...prices.map(p => p.price));
            const max = Math.max(...prices.map(p => p.price));
            const avg = Math.round(prices.reduce((a, b) => a + b.price, 0) / prices.length);
            const range = max - min;

            // Position bar
            const yourPercent = ((yourPrice - min) / range) * 100;
            document.getElementById('priceBar').style.width = '100%';
            document.getElementById('yourMarker').style.left = yourPercent + '%';
            document.getElementById('lowestLabel').textContent = '$' + min;
            document.getElementById('highestLabel').textContent = '$' + max;

            // Position text
            let position = '';
            if (yourPrice === min) position = 'Lowest price (value leader)';
            else if (yourPrice === max) position = 'Premium price (differentiation play)';
            else if (yourPrice < avg) position = 'Below average (competitive pricing)';
            else position = 'Above average (feature justification needed)';
            document.getElementById('positionText').textContent = position;

            // Gap
            const gap = yourPrice - avg;
            const gapText = gap > 0 ? `+$${gap} vs avg` : `-$${Math.abs(gap)} vs avg`;
            document.getElementById('gapText').textContent = gapText;
            document.getElementById('gapText').className = 'text-2xl font-bold ' + (gap > 0 ? 'text-orange-600' : 'text-green-600');

            // Recommendations
            const recs = [];
            if (yourPrice === min) {
                recs.push('You\'re the cheapest — emphasize value and ROI in messaging');
                recs.push('Consider if you\'re leaving money on the table');
                recs.push('Test a higher price with annual discount to anchor value');
            } else if (yourPrice === max) {
                recs.push('You\'re the most expensive — justify with clear differentiation');
                recs.push('Add a comparison table showing why you\'re worth more');
                recs.push('Consider a lower tier to capture price-sensitive users');
            } else {
                recs.push('You\'re in the middle — good position for most markets');
                recs.push('Test moving 10% up or down to find optimal price');
                recs.push('Add social proof to justify your specific price point');
            }
            recs.push(`Market average is $${avg} — your gap is ${Math.abs(gap)}`);

            document.getElementById('recommendations').innerHTML = recs.map(r => `<li>• ${r}</li>`).join('');
            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
