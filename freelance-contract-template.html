<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Contract Template — Protect Yourself</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-slate-500 via-gray-500 to-zinc-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">📄 Freelance Contract Template</h1>
            <p class="opacity-90">Generate a professional freelance contract in seconds.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Client Name</label>
                    <input type="text" id="clientName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500" placeholder="Acme Corp" value="Acme Corp">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Project Description</label>
                    <input type="text" id="projectDesc" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500" placeholder="Stripe integration for SaaS platform" value="Stripe integration for SaaS platform">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Total Fee ($)</label>
                    <input type="number" id="totalFee" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500" placeholder="2400" value="2400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Timeline (days)</label>
                    <input type="number" id="timeline" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500" placeholder="5" value="5">
                </div>
            </div>

            <button onclick="generateContract()" class="w-full py-3 bg-gradient-to-r from-slate-500 to-gray-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Contract →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="text-sm font-medium text-gray-500 mb-2">Generated Contract:</div>
                    <div class="text-gray-700 whitespace-pre-wrap text-sm" id="contractText"></div>
                </div>
                <button onclick="copyContract()" class="mt-4 w-full py-3 bg-gray-600 text-white rounded-lg font-semibold hover:bg-gray-700 transition">Copy Contract</button>
            </div>
        </div>
    </div>

    <script>
        function generateContract() {
            const client = document.getElementById('clientName').value;
            const project = document.getElementById('projectDesc').value;
            const fee = document.getElementById('totalFee').value;
            const days = document.getElementById('timeline').value;

            const contract = `FREELANCE SERVICE AGREEMENT

This Freelance Service Agreement ("Agreement") is entered into between:

Freelancer: [Your Name]
Client: ${client}

1. SCOPE OF WORK
Freelancer agrees to provide the following services to Client:
• ${project}
• Testing and quality assurance
• Documentation and handoff
• 30 days of post-launch support

2. TIMELINE
Work will commence within 24 hours of signed agreement and upfront payment.
Estimated completion: ${days} business days.

3. COMPENSATION
Total project fee: $${fee}
Payment terms:
• 50% upfront ($${Math.round(fee * 0.5)}) — due before work begins
• 50% on completion ($${Math.round(fee * 0.5)}) — due on delivery

4. REVISIONS
This agreement includes up to 2 rounds of revisions. Additional revisions billed at $${Math.round(fee / days)}/hour.

5. INTELLECTUAL PROPERTY
Upon full payment, all work product becomes Client's property. Freelancer retains right to use work in portfolio.

6. TERMINATION
Either party may terminate with 48 hours notice. Client pays for work completed to date.

7. LIMITATION OF LIABILITY
Freelancer's liability limited to total fee paid.

Signed:

_________________________
Freelancer: [Your Name]
Date: _______________

_________________________
Client: ${client}
Date: _______________`;

            document.getElementById('contractText').textContent = contract;
            document.getElementById('output').classList.remove('hidden');
        }

        function copyContract() {
            navigator.clipboard.writeText(document.getElementById('contractText').textContent);
            alert('Contract copied!');
        }
    </script>
</body>
</html>
