<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Time Zone Meeting Planner — Find Overlaps Across Time Zones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-violet-500 to-purple-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">🌍 Time Zone Meeting Planner</h1>
            <p class="opacity-90">Find the best meeting time across distributed team time zones.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="space-y-4 mb-6">
                <div class="grid md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Team Member 1 Timezone</label>
                        <select id="tz1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            <option value="-8">PST (UTC-8) — San Francisco</option>
                            <option value="-5">EST (UTC-5) — New York</option>
                            <option value="0">GMT (UTC+0) — London</option>
                            <option value="1">CET (UTC+1) — Berlin</option>
                            <option value="5.5">IST (UTC+5:30) — Mumbai</option>
                            <option value="8" selected>CST (UTC+8) — Singapore/China</option>
                            <option value="9">JST (UTC+9) — Tokyo</option>
                            <option value="10">AEST (UTC+10) — Sydney</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Team Member 2 Timezone</label>
                        <select id="tz2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            <option value="-8" selected>PST (UTC-8) — San Francisco</option>
                            <option value="-5">EST (UTC-5) — New York</option>
                            <option value="0">GMT (UTC+0) — London</option>
                            <option value="1">CET (UTC+1) — Berlin</option>
                            <option value="5.5">IST (UTC+5:30) — Mumbai</option>
                            <option value="8">CST (UTC+8) — Singapore/China</option>
                            <option value="9">JST (UTC+9) — Tokyo</option>
                            <option value="10">AEST (UTC+10) — Sydney</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Meeting Duration (hours)</label>
                        <select id="duration" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                            <option value="0.5">30 min</option>
                            <option value="1" selected>1 hour</option>
                            <option value="1.5">1.5 hours</option>
                            <option value="2">2 hours</option>
                        </select>
                    </div>
                </div>
            </div>

            <button onclick="findOverlap()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-violet-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Find Best Meeting Time →</button>

            <div id="output" class="mt-8 hidden space-y-6">
                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-3">Recommended Meeting Times</h3>
                    <div class="space-y-3" id="times"></div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-3">Work Hours Overlap</h3>
                    <div class="text-sm text-gray-600" id="overlap"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function findOverlap() {
            const tz1 = parseFloat(document.getElementById('tz1').value);
            const tz2 = parseFloat(document.getElementById('tz2').value);
            const duration = parseFloat(document.getElementById('duration').value);
            
            const tzNames = { '-8': 'PST', '-5': 'EST', '0': 'GMT', '1': 'CET', '5.5': 'IST', '8': 'CST', '9': 'JST', '10': 'AEST' };
            
            // Standard work hours: 9 AM - 5 PM local
            const workStart = 9;
            const workEnd = 17;
            
            // Convert both to UTC
            const t1StartUTC = workStart - tz1;
            const t1EndUTC = workEnd - tz1;
            const t2StartUTC = workStart - tz2;
            const t2EndUTC = workEnd - tz2;
            
            // Find overlap in UTC
            const overlapStart = Math.max(t1StartUTC, t2StartUTC);
            const overlapEnd = Math.min(t1EndUTC, t2EndUTC);
            
            let timesHtml = '';
            if (overlapEnd > overlapStart) {
                const local1Start = formatHour(overlapStart + tz1);
                const local1End = formatHour(overlapEnd + tz1);
                const local2Start = formatHour(overlapStart + tz2);
                const local2End = formatHour(overlapEnd + tz2);
                
                timesHtml = `
                    <div class="bg-white p-4 rounded-lg border border-green-200">
                        <div class="font-semibold text-green-700">✅ Overlap Found: ${formatHour(overlapStart)} - ${formatHour(overlapEnd)} UTC</div>
                        <div class="text-sm text-gray-600 mt-2">${tzNames[tz1]}: ${local1Start} - ${local1End}</div>
                        <div class="text-sm text-gray-600">${tzNames[tz2]}: ${local2Start} - ${local2End}</div>
                    </div>
                `;
            } else {
                timesHtml = `
                    <div class="bg-white p-4 rounded-lg border border-red-200">
                        <div class="font-semibold text-red-700">❌ No work hours overlap</div>
                        <div class="text-sm text-gray-600 mt-2">Someone will need to meet outside standard hours.</div>
                    </div>
                `;
            }
            
            document.getElementById('times').innerHTML = timesHtml;
            document.getElementById('overlap').innerHTML = `
                <p><strong>${tzNames[tz1]}</strong> works ${formatHour(t1StartUTC)} - ${formatHour(t1EndUTC)} UTC</p>
                <p><strong>${tzNames[tz2]}</strong> works ${formatHour(t2StartUTC)} - ${formatHour(t2EndUTC)} UTC</p>
                <p><strong>Overlap:</strong> ${overlapEnd > overlapStart ? formatHour(overlapStart) + ' - ' + formatHour(overlapEnd) + ' UTC' : 'None'}</p>
            `;
            document.getElementById('output').classList.remove('hidden');
        }
        
        function formatHour(h) {
            h = ((h % 24) + 24) % 24;
            const ampm = h >= 12 ? 'PM' : 'AM';
            const hour = h % 12 || 12;
            return `${hour} ${ampm}`;
        }
    </script>
</body>
</html>
