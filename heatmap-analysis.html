<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Heatmap Analysis — Where Visitors Click</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-rose-500 via-pink-500 to-purple-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">🗺️ Landing Page Heatmap Analysis</h1>
            <p class="opacity-90">Visualize where visitors click, scroll, and drop off on your landing page.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Upload Your Landing Page Screenshot</label>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center">
                    <div class="text-4xl mb-2">📸</div>
                    <p class="text-sm text-gray-500">Drag & drop or click to upload</p>
                    <p class="text-xs text-gray-400 mt-1">PNG, JPG, or WebP</p>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Element Click Data</label>
                <div class="space-y-2" id="clickData">
                    <div class="flex items-center gap-2">
                        <input type="text" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="Element name (e.g. 'Sign Up button')">
                        <input type="number" class="w-20 px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="Clicks">
                        <button onclick="addRow()" class="px-3 py-2 bg-rose-500 text-white rounded-lg text-sm">+</button>
                    </div>
                </div>
            </div>

            <button onclick="generateHeatmap()" class="w-full py-3 bg-gradient-to-r from-rose-500 to-pink-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Heatmap →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-4">Click Distribution</h3>
                    <div class="space-y-3" id="heatmapBars"></div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl mt-4">
                    <h3 class="font-semibold mb-4">Insights</h3>
                    <ul class="space-y-2 text-sm text-gray-600" id="insights"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function addRow() {
            const container = document.getElementById('clickData');
            const row = document.createElement('div');
            row.className = 'flex items-center gap-2';
            row.innerHTML = `
                <input type="text" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="Element name">
                <input type="number" class="w-20 px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="Clicks">
                <button onclick="this.parentElement.remove()" class="px-3 py-2 bg-gray-300 text-gray-700 rounded-lg text-sm">-</button>
            `;
            container.appendChild(row);
        }

        function generateHeatmap() {
            const rows = document.querySelectorAll('#clickData > div');
            const data = [];
            let totalClicks = 0;

            rows.forEach(row => {
                const name = row.querySelector('input[type="text"]').value;
                const clicks = parseInt(row.querySelector('input[type="number"]').value) || 0;
                if (name && clicks) {
                    data.push({ name, clicks });
                    totalClicks += clicks;
                }
            });

            if (data.length === 0) return;

            const maxClicks = Math.max(...data.map(d => d.clicks));
            
            document.getElementById('heatmapBars').innerHTML = data.map(d => {
                const pct = (d.clicks / totalClicks * 100).toFixed(1);
                const width = (d.clicks / maxClicks * 100).toFixed(0);
                const color = d.clicks === maxClicks ? 'bg-red-500' : 
                             d.clicks > maxClicks * 0.6 ? 'bg-orange-500' : 
                             d.clicks > maxClicks * 0.3 ? 'bg-yellow-500' : 'bg-gray-300';
                
                return `
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span>${d.name}</span>
                            <span>${d.clicks} clicks (${pct}%)</span>
                        </div>
                        <div class="bg-gray-200 rounded-full h-4">
                            <div class="${color} h-4 rounded-full transition-all" style="width: ${width}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            const insights = [];
            const topElement = data[0];
            const bottomElement = data[data.length - 1];
            
            if (topElement.clicks > totalClicks * 0.5) {
                insights.push(`🔥 "${topElement.name}" gets ${(topElement.clicks/totalClicks*100).toFixed(0)}% of all clicks. Make sure it converts!`);
            }
            if (bottomElement.clicks < totalClicks * 0.05) {
                insights.push(`💀 "${bottomElement.name}" is almost invisible. Consider moving it or changing the design.`);
            }
            insights.push(`📊 Total tracked clicks: ${totalClicks}`);
            insights.push(`💡 Tip: Elements above the fold should get 60%+ of clicks.`);

            document.getElementById('insights').innerHTML = insights.map(i => `<li>${i}</li>`).join('');
            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
