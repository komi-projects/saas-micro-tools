<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Content Calendar Generator — Plan Your Growth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-violet-500 via-purple-500 to-fuchsia-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">📅 SaaS Content Calendar Generator</h1>
            <p class="opacity-90">Generate a 30-day content calendar for your SaaS.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Your Product Name</label>
                <input type="text" id="productName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-violet-500" placeholder="SimpleRecover" value="SimpleRecover">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Content Topics (comma-separated)</label>
                <input type="text" id="topics" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-violet-500" placeholder="churn reduction, Stripe, SaaS pricing" value="churn reduction, Stripe, SaaS pricing">
            </div>

            <button onclick="generateCalendar()" class="w-full py-3 bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate 30-Day Calendar →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-4">30-Day Content Calendar</h3>
                    <div class="space-y-3 text-sm" id="calendarContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateCalendar() {
            const product = document.getElementById('productName').value;
            const topics = document.getElementById('topics').value.split(',').map(t => t.trim());
            
            const contentTypes = ['Blog Post', 'Twitter Thread', 'LinkedIn Post', 'Newsletter', 'Product Update', 'Case Study', 'Tutorial'];
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            
            let calendar = '';
            for (let i = 1; i <= 30; i++) {
                const day = days[(i - 1) % 7];
                const type = contentTypes[(i - 1) % contentTypes.length];
                const topic = topics[(i - 1) % topics.length];
                
                calendar += `<div class="flex justify-between items-center border-b py-2">
                    <span class="font-medium">Day ${i} (${day})</span>
                    <span class="text-gray-600">${type}: "${topic} for ${product}"</span>
                </div>`;
            }
            
            document.getElementById('calendarContent').innerHTML = calendar;
            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
