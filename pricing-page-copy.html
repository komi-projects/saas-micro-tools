<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Pricing Page Copy Generator — Convert Visitors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-blue-500 to-cyan-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">📝 Pricing Page Copy Generator</h1>
            <p class="opacity-90">Generate conversion-focused pricing page copy for your SaaS.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                    <input type="text" id="product" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="MyApp" value="MyApp">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tagline</label>
                    <input type="text" id="tagline" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="The simplest way to..." value="The simplest way to automate your workflow">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Price ($/mo)</label>
                    <input type="number" id="price" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="29" value="29">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Key Benefit</label>
                    <input type="text" id="benefit" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="save 10 hours/week" value="save 10 hours/week">
                </div>
            </div>

            <button onclick="generate()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-blue-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Copy →</button>

            <div id="output" class="mt-8 hidden space-y-6">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="text-sm font-medium text-gray-500 mb-2">Hero Headline</div>
                    <div class="text-xl font-bold mb-2" id="headline"></div>
                    <div class="text-sm text-gray-600" id="subheadline"></div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="text-sm font-medium text-gray-500 mb-2">Pricing Section</div>
                    <div class="text-lg font-bold mb-2" id="pricingTitle"></div>
                    <div class="text-sm text-gray-600 whitespace-pre-wrap" id="pricingCopy"></div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="text-sm font-medium text-gray-500 mb-2">FAQ Section</div>
                    <div class="text-sm text-gray-600 whitespace-pre-wrap" id="faqCopy"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generate() {
            const product = document.getElementById('product').value;
            const tagline = document.getElementById('tagline').value;
            const price = document.getElementById('price').value;
            const benefit = document.getElementById('benefit').value;

            document.getElementById('headline').textContent = `Simple pricing. Powerful results.`;
            document.getElementById('subheadline').textContent = `${product} helps you ${benefit} for less than a daily coffee.`;

            document.getElementById('pricingTitle').textContent = `$${price}/month — Everything you need`;
            document.getElementById('pricingCopy').textContent = `✓ Unlimited ${benefit.split(' ').pop()}
✓ Priority support
✓ All integrations
✓ Cancel anytime — no questions asked

Start your free trial. No credit card required.`;

            document.getElementById('faqCopy').textContent = `Q: Can I cancel anytime?
A: Yes. Cancel with one click. No calls, no hassle.

Q: Is there a free trial?
A: Yes. 14 days free. No credit card required.

Q: What if I need more features?
A: Email us. We build features our users actually need.

Q: Do you offer refunds?
A: If ${product} doesn't work for you, we'll refund your last month. No questions asked.`;

            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
