
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS NPS Calculator — Premium Net Promoter Score Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            padding: 40px 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .input-group {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #6366f1;
        }
        .cta {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 32px;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }
        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }
        .results {
            display: none;
        }
        .results.active {
            display: block;
        }
        .result-card {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .result-title {
            font-size: 1.25rem;
            font-weight: 600;
        }
        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .result-detail {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 8px;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 24px;
        }
        .metric-box {
            background: #0f0f1a;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #6366f1;
        }
        .metric-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 4px;
        }
        .recommendation {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
        }
        .recommendation-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #818cf8;
        }
        .tooltip {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            text-align: center;
            line-height: 16px;
            font-size: 0.7rem;
            cursor: help;
            margin-left: 4px;
        }
        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; }
            .metrics-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SaaS NPS Calculator</h1>
        <p class="subtitle">Premium Net Promoter Score analytics</p>

        <div class="input-grid">
            <div class="input-group">
                <label>Total Responses <span class="tooltip" title="Total NPS survey responses">?</span></label>
                <input type="number" id="responses" placeholder="100" value="100">
            </div>
            <div class="input-group">
                <label>Promoters (9-10)</label>
                <input type="number" id="promoters" placeholder="50" value="50">
            </div>
            <div class="input-group">
                <label>Passives (7-8)</label>
                <input type="number" id="passives" placeholder="30" value="30">
            </div>
            <div class="input-group">
                <label>Detractors (0-6)</label>
                <input type="number" id="detractors" placeholder="20" value="20">
            </div>
        </div>

        <button class="cta" onclick="calculate()">Calculate NPS</button>

        <div class="results" id="results">
            <div class="result-card">
                <div class="result-header">
                    <div class="result-title">Net Promoter Score</div>
                    <div class="result-value" id="nps">0</div>
                </div>
                <div class="result-detail" id="npsDetail">NPS range: -100 to +100</div>
                
                <div class="metrics-grid">
                    <div class="metric-box">
                        <div class="metric-value" id="promoterPct">0%</div>
                        <div class="metric-label">Promoters</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-value" id="detractorPct">0%</div>
                        <div class="metric-label">Detractors</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-value" id="yourStatus">Unknown</div>
                        <div class="metric-label">Status</div>
                    </div>
                </div>

                <div class="recommendation">
                    <div class="recommendation-title">💡 NPS Insights</div>
                    <div id="recommendationText">Calculate to see personalized NPS recommendations.</div>
                </div>
            </div>

            <div class="result-card">
                <div class="result-header">
                    <div class="result-title">Benchmarks</div>
                </div>
                <div class="metrics-grid">
                    <div class="metric-box">
                        <div class="metric-value">0+</div>
                        <div class="metric-label">Good</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-value">30+</div>
                        <div class="metric-label">Great</div>
                    </div>
                    <div class="metric-box">
                        <div class="metric-value">50+</div>
                        <div class="metric-label">Excellent</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const responses = parseFloat(document.getElementById('responses').value) || 1;
            const promoters = parseFloat(document.getElementById('promoters').value) || 0;
            const passives = parseFloat(document.getElementById('passives').value) || 0;
            const detractors = parseFloat(document.getElementById('detractors').value) || 0;

            const nps = ((promoters - detractors) / responses) * 100;
            const promoterPct = (promoters / responses) * 100;
            const detractorPct = (detractors / responses) * 100;
            const passivePct = (passives / responses) * 100;

            let yourStatus = 'Unknown';
            if (nps >= 50) yourStatus = 'Excellent';
            else if (nps >= 30) yourStatus = 'Great';
            else if (nps >= 0) yourStatus = 'Good';
            else yourStatus = 'At Risk';

            document.getElementById('nps').textContent = Math.round(nps);
            document.getElementById('promoterPct').textContent = promoterPct.toFixed(1) + '%';
            document.getElementById('detractorPct').textContent = detractorPct.toFixed(1) + '%';
            document.getElementById('yourStatus').textContent = yourStatus;

            let recommendation = '';
            if (nps >= 50) {
                recommendation = '🏆 Excellent NPS! Your customers are your best marketers. To leverage: 1) Build a formal referral program, 2. Use promoters as case studies and testimonials, 3. Ask promoters for reviews on G2/Capterra, 4. Monitor for any downward trends.';
            } else if (nps >= 30) {
                recommendation = '✅ Great NPS. To reach excellent: 1. Survey passives — what would make them promoters?, 2. Address detractor feedback quickly, 3. Add "share with a friend" features, 4. Consider NPS-driven loyalty rewards.';
            } else if (nps >= 0) {
                recommendation = '✓ Good NPS. To improve: 1. Identify detractor themes — what's causing dissatisfaction?, 2. Improve core product experience, 3. Add customer success touchpoints, 4. Close the loop with detractors personally.';
            } else {
                recommendation = '🚨 Negative NPS — more detractors than promoters. Urgent: 1. Interview detractors immediately — what's wrong?, 2. Fix critical product issues, 3. Improve support response times, 4. Consider compensation for affected customers, 5. Re-evaluate product-market fit.';
            }
            document.getElementById('recommendationText').textContent = recommendation;
            document.getElementById('results').classList.add('active');
        }
    </script>
</body>
</html>
