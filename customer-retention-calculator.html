<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Retention Calculator — Predict Your Growth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-teal-500 via-emerald-500 to-green-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">🔄 Customer Retention Calculator</h1>
            <p class="opacity-90">See how retention rate affects your customer base and revenue over time.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Starting Customers</label>
                    <input type="number" id="startCustomers" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="100" value="100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New Customers/Month</label>
                    <input type="number" id="newPerMonth" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="20" value="20">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Retention Rate (%)</label>
                    <input type="number" id="retentionRate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="95" value="95">
                </div>
            </div>

            <button onclick="calculate()" class="w-full py-3 bg-gradient-to-r from-teal-500 to-green-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Calculate Retention Impact →</button>

            <div id="output" class="mt-8 hidden space-y-6">
                <div class="grid md:grid-cols-3 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Customers After 12 Months</div>
                        <div class="text-2xl font-bold text-teal-600" id="customers12"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Total Churned</div>
                        <div class="text-2xl font-bold text-red-600" id="totalChurned"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Effective Growth</div>
                        <div class="text-2xl font-bold text-green-600" id="effectiveGrowth"></div>
                    </div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-3">Monthly Breakdown</h3>
                    <div class="space-y-2 text-sm" id="monthlyBreakdown"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const start = parseInt(document.getElementById('startCustomers').value);
            const newPerMonth = parseInt(document.getElementById('newPerMonth').value);
            const retention = parseFloat(document.getElementById('retentionRate').value) / 100;

            let customers = start;
            let totalChurned = 0;
            let breakdown = [];

            for (let month = 1; month <= 12; month++) {
                const churned = Math.round(customers * (1 - retention));
                customers = Math.round(customers * retention) + newPerMonth;
                totalChurned += churned;
                
                breakdown.push({
                    month,
                    customers,
                    churned,
                    netGrowth: customers - start
                });
            }

            document.getElementById('customers12').textContent = customers;
            document.getElementById('totalChurned').textContent = totalChurned;
            const growth = ((customers - start) / start * 100).toFixed(0);
            document.getElementById('effectiveGrowth').textContent = (growth > 0 ? '+' : '') + growth + '%';

            document.getElementById('monthlyBreakdown').innerHTML = breakdown.map(b => 
                `<div class="flex justify-between">
                    <span>Month ${b.month}: ${b.customers} customers</span>
                    <span class="text-gray-500">-${b.churned} churned, net +${b.netGrowth}</span>
                </div>`
            ).join('');

            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
