<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churn Risk Scorer — Komi Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 2rem; margin-bottom: 8px; color: #fff; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 0.95rem; }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .input-group {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 15px;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input, .input-group select {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            color: #fff;
            font-size: 0.9rem;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        .btn {
            background: #ff6b6b;
            color: #0a0a0a;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            margin: 10px 0 25px;
            transition: all 0.2s;
            width: 100%;
        }
        .btn:hover { background: #ff5252; transform: translateY(-1px); }
        .score-display {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 25px;
            display: none;
        }
        .score-display.active { display: block; }
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            position: relative;
        }
        .score-low { background: conic-gradient(#00c853 0% var(--pct), #1a1a1a var(--pct) 100%); }
        .score-medium { background: conic-gradient(#ffaa00 0% var(--pct), #1a1a1a var(--pct) 100%); }
        .score-high { background: conic-gradient(#ff4444 0% var(--pct), #1a1a1a var(--pct) 100%); }
        .score-label {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .score-desc { color: #888; font-size: 0.9rem; }
        .factors {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        .factors.active { display: block; }
        .factor-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }
        .factor-row:last-child { border-bottom: none; }
        .factor-name { font-size: 0.9rem; color: #ccc; }
        .factor-impact {
            font-size: 0.8rem;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        .impact-low { background: #00c85333; color: #00c853; }
        .impact-medium { background: #ffaa0033; color: #ffaa00; }
        .impact-high { background: #ff444433; color: #ff4444; }
        .actions {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            display: none;
        }
        .actions.active { display: block; }
        .actions h3 { font-size: 1rem; margin-bottom: 12px; color: #fff; }
        .action-item {
            padding: 8px 0;
            border-bottom: 1px solid #222;
            font-size: 0.85rem;
            color: #aaa;
        }
        .action-item:last-child { border-bottom: none; }
        .footer {
            margin-top: 40px;
            text-align: center;
            color: #555;
            font-size: 0.8rem;
            padding-top: 20px;
            border-top: 1px solid #222;
        }
        .footer a { color: #ff6b6b; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Churn Risk Scorer</h1>
        <p class="subtitle">Input customer signals to predict churn probability and get retention actions</p>

        <div class="form-grid">
            <div class="input-group">
                <label>Failed Payments (last 90 days)</label>
                <input type="number" id="failedPayments" min="0" value="1">
            </div>
            <div class="input-group">
                <label>Days Since Last Login</label>
                <input type="number" id="daysSinceLogin" min="0" value="15">
            </div>
            <div class="input-group">
                <label>Plan Tier</label>
                <select id="planTier">
                    <option value="basic">Basic ($29/mo)</option>
                    <option value="pro" selected>Pro ($99/mo)</option>
                    <option value="enterprise">Enterprise ($299/mo)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Account Age (months)</label>
                <input type="number" id="accountAge" min="0" value="6">
            </div>
            <div class="input-group">
                <label>Support Tickets (last 30 days)</label>
                <input type="number" id="supportTickets" min="0" value="0">
            </div>
            <div class="input-group">
                <label>Feature Usage (% of plan)</label>
                <input type="number" id="featureUsage" min="0" max="100" value="45">
            </div>
            <div class="input-group">
                <label>Payment Method</label>
                <select id="paymentMethod">
                    <option value="card" selected>Credit Card</option>
                    <option value="paypal">PayPal</option>
                    <option value="ach">ACH/Bank</option>
                    <option value="expired">Expired Card</option>
                </select>
            </div>
            <div class="input-group">
                <label>NPS Score (if known)</label>
                <input type="number" id="npsScore" min="-100" max="100" placeholder="Optional">
            </div>
        </div>

        <button class="btn" onclick="calculateRisk()">Calculate Churn Risk</button>

        <div id="scoreDisplay" class="score-display">
            <div id="scoreCircle" class="score-circle"></div>
            <div id="scoreLabel" class="score-label"></div>
            <div id="scoreDesc" class="score-desc"></div>
        </div>

        <div id="factors" class="factors">
            <div class="factor-row">
                <span class="factor-name">Payment Failures</span>
                <span id="factor-failed" class="factor-impact"></span>
            </div>
            <div class="factor-row">
                <span class="factor-name">Engagement (login recency)</span>
                <span id="factor-engagement" class="factor-impact"></span>
            </div>
            <div class="factor-row">
                <span class="factor-name">Feature Adoption</span>
                <span id="factor-usage" class="factor-impact"></span>
            </div>
            <div class="factor-row">
                <span class="factor-name">Payment Method Health</span>
                <span id="factor-payment" class="factor-impact"></span>
            </div>
            <div class="factor-row">
                <span class="factor-name">Account Maturity</span>
                <span id="factor-maturity" class="factor-impact"></span>
            </div>
            <div class="factor-row">
                <span class="factor-name">Support Friction</span>
                <span id="factor-support" class="factor-impact"></span>
            </div>
        </div>

        <div id="actions" class="actions">
            <h3>🛡️ Retention Actions</h3>
            <div id="actionList"></div>
        </div>

        <div class="footer">
            Built by <a href="https://github.com/komisimple" target="_blank">Komi</a> — Part of the <a href="https://simplerecover.io" target="_blank">SimpleRecover</a> toolkit
        </div>
    </div>

    <script>
        function calculateRisk() {
            const failedPayments = parseInt(document.getElementById('failedPayments').value) || 0;
            const daysSinceLogin = parseInt(document.getElementById('daysSinceLogin').value) || 0;
            const planTier = document.getElementById('planTier').value;
            const accountAge = parseInt(document.getElementById('accountAge').value) || 0;
            const supportTickets = parseInt(document.getElementById('supportTickets').value) || 0;
            const featureUsage = parseInt(document.getElementById('featureUsage').value) || 0;
            const paymentMethod = document.getElementById('paymentMethod').value;
            const npsScore = parseInt(document.getElementById('npsScore').value) || null;

            // Calculate risk score (0-100)
            let score = 0;
            const weights = {
                failed: 25,
                engagement: 20,
                usage: 15,
                payment: 15,
                maturity: 10,
                support: 10,
                nps: 5
            };

            // Failed payments
            let failedRisk = Math.min(failedPayments * 12, 100);
            if (failedPayments >= 3) failedRisk = 100;
            score += failedRisk * (weights.failed / 100);
            setFactor('factor-failed', failedRisk);

            // Engagement
            let engagementRisk = 0;
            if (daysSinceLogin > 30) engagementRisk = 80;
            else if (daysSinceLogin > 14) engagementRisk = 50;
            else if (daysSinceLogin > 7) engagementRisk = 25;
            score += engagementRisk * (weights.engagement / 100);
            setFactor('factor-engagement', engagementRisk);

            // Feature usage
            let usageRisk = Math.max(0, 100 - featureUsage);
            if (featureUsage < 20) usageRisk = 90;
            score += usageRisk * (weights.usage / 100);
            setFactor('factor-usage', usageRisk);

            // Payment method
            let paymentRisk = 0;
            if (paymentMethod === 'expired') paymentRisk = 85;
            else if (paymentMethod === 'card' && failedPayments > 0) paymentRisk = 60;
            else if (paymentMethod === 'paypal') paymentRisk = 20;
            else if (paymentMethod === 'ach') paymentRisk = 10;
            score += paymentRisk * (weights.payment / 100);
            setFactor('factor-payment', paymentRisk);

            // Account maturity
            let maturityRisk = 0;
            if (accountAge < 3) maturityRisk = 40; // New accounts churn more
            else if (accountAge > 24) maturityRisk = 10; // Long-term customers stay
            else maturityRisk = 25;
            score += maturityRisk * (weights.maturity / 100);
            setFactor('factor-maturity', maturityRisk);

            // Support tickets
            let supportRisk = 0;
            if (supportTickets >= 3) supportRisk = 70;
            else if (supportTickets === 2) supportRisk = 45;
            else if (supportTickets === 1) supportRisk = 20;
            score += supportRisk * (weights.support / 100);
            setFactor('factor-support', supportRisk);

            // NPS adjustment
            if (npsScore !== null) {
                let npsRisk = 0;
                if (npsScore < 0) npsRisk = 80;
                else if (npsScore < 30) npsRisk = 50;
                else if (npsScore < 50) npsRisk = 30;
                score += npsRisk * (weights.nps / 100);
            }

            // Plan tier adjustment
            if (planTier === 'enterprise') score *= 0.8; // Enterprise customers harder to lose
            else if (planTier === 'basic') score *= 1.1; // Basic customers easier to lose

            score = Math.round(Math.min(100, Math.max(0, score)));

            // Display
            const circle = document.getElementById('scoreCircle');
            const label = document.getElementById('scoreLabel');
            const desc = document.getElementById('scoreDesc');

            circle.style.setProperty('--pct', score + '%');
            circle.textContent = score;

            if (score < 30) {
                circle.className = 'score-circle score-low';
                label.textContent = 'Low Churn Risk ✅';
                label.style.color = '#00c853';
                desc.textContent = 'Customer is healthy. Monitor for changes but no immediate action needed.';
            } else if (score < 60) {
                circle.className = 'score-circle score-medium';
                label.textContent = 'Medium Churn Risk ⚠️';
                label.style.color = '#ffaa00';
                desc.textContent = 'Warning signs present. Proactive engagement recommended within 7 days.';
            } else {
                circle.className = 'score-circle score-high';
                label.textContent = 'High Churn Risk 🔴';
                label.style.color = '#ff4444';
                desc.textContent = 'Critical — immediate intervention required. High probability of churn within 30 days.';
            }

            document.getElementById('scoreDisplay').classList.add('active');
            document.getElementById('factors').classList.add('active');

            // Actions
            const actionList = document.getElementById('actionList');
            const actions = getActions(score, failedPayments, daysSinceLogin, featureUsage, paymentMethod);
            actionList.innerHTML = actions.map(a => `<div class="action-item">${a}</div>`).join('');
            document.getElementById('actions').classList.add('active');
        }

        function setFactor(id, risk) {
            const el = document.getElementById(id);
            if (risk < 30) { el.className = 'factor-impact impact-low'; el.textContent = 'Low'; }
            else if (risk < 60) { el.className = 'factor-impact impact-medium'; el.textContent = 'Medium'; }
            else { el.className = 'factor-impact impact-high'; el.textContent = 'High'; }
        }

        function getActions(score, failedPayments, daysSinceLogin, featureUsage, paymentMethod) {
            const actions = [];
            
            if (score >= 60) {
                actions.push('🔴 <b>Immediate:</b> Personal outreach from account manager within 24 hours');
                actions.push('🎁 <b>Retention offer:</b> 20% discount for 3 months or free month + downgrade option');
            }
            
            if (failedPayments > 0) {
                actions.push('💳 <b>Payment:</b> Send 1-click update link + offer alternative payment methods');
                if (failedPayments >= 2) {
                    actions.push('📞 <b>Payment:</b> Phone call to resolve payment issue (high recovery rate)');
                }
            }
            
            if (daysSinceLogin > 14) {
                actions.push('📧 <b>Re-engagement:</b> Send "We miss you" email with new feature highlights');
                actions.push('🎯 <b>Re-engagement:</b> Offer personalized onboarding/training session');
            }
            
            if (featureUsage < 30) {
                actions.push('💡 <b>Adoption:</b> Share 3 key features they\'re not using (with use-case examples)');
                actions.push('🤝 <b>Adoption:</b> Schedule 15-min success check-in call');
            }
            
            if (paymentMethod === 'expired') {
                actions.push('⏰ <b>Payment:</b> Urgent — card expired. Send immediate notice with direct update link');
            }
            
            if (score < 30) {
                actions.push('✅ <b>Monitor:</b> Add to "healthy customers" list — check in monthly');
                actions.push('🌟 <b>Advocacy:</b> Ask for testimonial or case study (they\'re happy!)');
            }
            
            if (score >= 30 && score < 60) {
                actions.push('⚠️ <b>Watch:</b> Add to "at-risk" segment — monitor weekly');
                actions.push('📊 <b>Review:</b> Check if competitor activity or pricing concern triggered changes');
            }
            
            return actions.length ? actions : ['✅ Customer is healthy — maintain regular engagement rhythm'];
        }
    </script>
</body>
</html>
