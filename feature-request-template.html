<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Request Template — Capture Great Ideas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-sky-500 via-blue-500 to-indigo-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">💡 Feature Request Template</h1>
            <p class="opacity-90">Standardized format for capturing and evaluating feature requests.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Feature Name</label>
                <input type="text" id="featureName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500" placeholder="Dark mode support">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">User Problem</label>
                <textarea id="userProblem" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 h-20" placeholder="Users complain about eye strain when working late"></textarea>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Proposed Solution</label>
                <textarea id="solution" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500 h-20" placeholder="Add a toggle for dark mode with system preference detection"></textarea>
            </div>
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Impact (1-10)</label>
                    <input type="number" id="impact" min="1" max="10" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500" value="7">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Effort (1-10)</label>
                    <input type="number" id="effort" min="1" max="10" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500" value="4">
                </div>
            </div>

            <button onclick="generate()" class="w-full py-3 bg-gradient-to-r from-sky-500 to-blue-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Feature Request →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-4">
                    <div class="text-sm font-medium text-gray-500 mb-2">Formatted Request:</div>
                    <div class="text-sm text-gray-600 whitespace-pre-wrap" id="requestText"></div>
                </div>
                <div class="mb-4">
                    <div class="text-sm font-medium text-gray-500 mb-1">RICE Score:</div>
                    <div class="text-2xl font-bold text-sky-600" id="riceScore"></div>
                    <div class="text-xs text-gray-500">(Reach × Impact × Confidence) / Effort</div>
                </div>
                <button onclick="copyRequest()" class="px-4 py-2 bg-sky-600 text-white rounded-lg hover:bg-sky-700 transition">Copy Request</button>
            </div>
        </div>
    </div>

    <script>
        function generate() {
            const name = document.getElementById('featureName').value;
            const problem = document.getElementById('userProblem').value;
            const solution = document.getElementById('solution').value;
            const impact = parseInt(document.getElementById('impact').value);
            const effort = parseInt(document.getElementById('effort').value);
            const rice = Math.round((100 * impact * 0.8) / effort);

            document.getElementById('requestText').textContent = `## Feature Request: ${name}

**User Problem:**
${problem}

**Proposed Solution:**
${solution}

**Impact:** ${impact}/10 | **Effort:** ${effort}/10 | **RICE Score:** ${rice}

**Status:** Under Review`;
            document.getElementById('riceScore').textContent = rice;
            document.getElementById('output').classList.remove('hidden');
        }

        function copyRequest() {
            const text = document.getElementById('requestText').textContent;
            navigator.clipboard.writeText(text);
            alert('Request copied!');
        }
    </script>
</body>
</html>
