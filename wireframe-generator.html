<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Wireframe Generator — Blueprint Your Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-gray-500 via-slate-500 to-zinc-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">🏗️ Landing Page Wireframe Generator</h1>
            <p class="opacity-90">Generate a complete landing page wireframe structure in seconds.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">What does your product do?</label>
                <input type="text" id="productName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-500" placeholder="Recover failed Stripe payments automatically" value="Recover failed Stripe payments automatically">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Target audience</label>
                <input type="text" id="audience" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-500" placeholder="SaaS founders" value="SaaS founders">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Key benefit</label>
                <input type="text" id="benefit" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-500" placeholder="reduce churn by 30%" value="reduce churn by 30%">
            </div>

            <button onclick="generateWireframe()" class="w-full py-3 bg-gradient-to-r from-gray-500 to-slate-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Wireframe →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-4">Wireframe Structure</h3>
                    <div class="space-y-4" id="wireframeSections"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generateWireframe() {
            const product = document.getElementById('productName').value;
            const audience = document.getElementById('audience').value;
            const benefit = document.getElementById('benefit').value;

            const sections = [
                {
                    name: 'Hero Section',
                    content: `Headline: "Stop Losing Revenue. ${product.charAt(0).toUpperCase() + product.slice(1)}."\nSubheadline: "Built for ${audience} who want to ${benefit}."\nCTA: "Start Free Trial →"\nVisual: Product screenshot or demo GIF`
                },
                {
                    name: 'Social Proof',
                    content: `Trust badges: "Trusted by 500+ SaaS teams"\nLogos: Stripe, Notion, Figma (placeholder)\nTestimonial: "We recovered $12K in the first month" — CEO, TechStart`
                },
                {
                    name: 'Problem Section',
                    content: `Headline: "The Hidden Revenue Leak"\n3 pain points with icons:\n• Failed payments slip through cracks\n• Manual retries waste engineering time\n• Churn compounds silently\nVisual: Before/after diagram`
                },
                {
                    name: 'Solution Section',
                    content: `Headline: "One Integration, Zero Missed Payments"\n3 features with icons:\n• Smart retry logic\n• Dunning email sequences\n• Real-time dashboard\nVisual: Product interface screenshot`
                },
                {
                    name: 'Pricing Section',
                    content: `3 tiers: Starter ($19/mo), Growth ($49/mo), Scale ($99/mo)\n"Most Popular" badge on Growth\nAnnual toggle: "Save 2 months"\nFAQ: "Can I change plans?"`
                },
                {
                    name: 'CTA Section',
                    content: `Headline: "Join 500+ SaaS teams recovering revenue"\nCTA: "Start Free Trial — No credit card required"\nRisk reversal: "14-day free trial. Cancel anytime."`
                },
                {
                    name: 'Footer',
                    content: `Links: Product, Pricing, Blog, Contact\nSocial: Twitter, LinkedIn, GitHub\nLegal: Privacy, Terms\nNewsletter: "Get SaaS growth tips"`
                }
            ];

            document.getElementById('wireframeSections').innerHTML = sections.map(s => `
                <div class="border border-gray-200 rounded-lg p-4">
                    <div class="font-semibold text-gray-700 mb-2">${s.name}</div>
                    <pre class="text-sm text-gray-600 whitespace-pre-wrap">${s.content}</pre>
                </div>
            `).join('');

            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
