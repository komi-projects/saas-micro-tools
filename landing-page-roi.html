<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page ROI Calculator — Is It Worth It?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-pink-500 via-rose-500 to-red-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">📈 Landing Page ROI Calculator</h1>
            <p class="opacity-90">Calculate the return on investment for your landing page efforts.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Landing Page Cost ($)</label>
                    <input type="number" id="lpCost" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500" placeholder="500" value="500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Visitors</label>
                    <input type="number" id="visitors" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500" placeholder="1000" value="1000">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Conversion Rate (%)</label>
                    <input type="number" id="conversion" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500" placeholder="3" value="3">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Customer Value ($/mo)</label>
                    <input type="number" id="customerValue" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500" placeholder="29" value="29">
                </div>
            </div>

            <button onclick="calculate()" class="w-full py-3 bg-gradient-to-r from-pink-500 to-rose-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Calculate ROI →</button>

            <div id="output" class="mt-8 hidden space-y-6">
                <div class="grid md:grid-cols-3 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Monthly Conversions</div>
                        <div class="text-2xl font-bold text-gray-800" id="monthlyConversions"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Monthly Revenue</div>
                        <div class="text-2xl font-bold text-green-600" id="monthlyRevenue"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">ROI (Monthly)</div>
                        <div class="text-2xl font-bold" id="monthlyROI"></div>
                    </div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-3">Payback Period</h3>
                    <div class="text-3xl font-bold text-pink-600" id="paybackPeriod"></div>
                    <div class="text-sm text-gray-500 mt-1">months to recover landing page cost</div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-3">1-Year Projection</h3>
                    <div class="text-3xl font-bold text-green-600" id="yearProjection"></div>
                    <div class="text-sm text-gray-500 mt-1">revenue generated (minus initial cost)</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const lpCost = parseFloat(document.getElementById('lpCost').value);
            const visitors = parseFloat(document.getElementById('visitors').value);
            const conversion = parseFloat(document.getElementById('conversion').value) / 100;
            const customerValue = parseFloat(document.getElementById('customerValue').value);

            const monthlyConversions = Math.round(visitors * conversion);
            const monthlyRevenue = monthlyConversions * customerValue;
            const monthlyROI = Math.round(((monthlyRevenue - lpCost) / lpCost) * 100);
            const payback = lpCost / monthlyRevenue;
            const yearRevenue = (monthlyRevenue * 12) - lpCost;

            document.getElementById('monthlyConversions').textContent = monthlyConversions + ' customers';
            document.getElementById('monthlyRevenue').textContent = '$' + monthlyRevenue.toLocaleString();
            document.getElementById('monthlyROI').textContent = monthlyROI + '%';
            document.getElementById('monthlyROI').className = 'text-2xl font-bold ' + (monthlyROI > 0 ? 'text-green-600' : 'text-red-600');
            document.getElementById('paybackPeriod').textContent = payback < 1 ? '< 1' : payback.toFixed(1);
            document.getElementById('yearProjection').textContent = '$' + yearRevenue.toLocaleString();

            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
