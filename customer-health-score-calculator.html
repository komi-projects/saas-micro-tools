<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Customer Health Score Calculator — Churn Prediction</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f8fafc;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            margin-top: 24px;
            display: none;
        }
        .result.active {
            display: block;
        }
        .result-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-detail {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .cta {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        @media (max-width: 600px) {
            .container { padding: 24px; }
            .result-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SaaS Customer Health Score Calculator</h1>
        <p class="subtitle">Predict which customers are at risk of churning</p>

        <div class="input-group">
            <label>Login Frequency (days/week, 0-7)</label>
            <input type="number" id="loginFreq" min="0" max="7" placeholder="5" value="5">
        </div>

        <div class="input-group">
            <label>Feature Usage (% of features used, 0-100)</label>
            <input type="number" id="featureUsage" min="0" max="100" placeholder="60" value="60">
        </div>

        <div class="input-group">
            <label>Days Since Last Activity (0-90)</label>
            <input type="number" id="lastActivity" min="0" max="90" placeholder="3" value="3">
        </div>

        <div class="input-group">
            <label>Support Tickets (0-10)</label>
            <input type="number" id="tickets" min="0" max="10" placeholder="1" value="1">
        </div>

        <button class="cta" onclick="calculate()">Calculate Health Score</button>

        <div class="result" id="result">
            <div class="result-label">Customer Health Score</div>
            <div class="result-value" id="score">0/100</div>
            <div class="result-detail" id="detail"></div>
        </div>
    </div>

    <script>
        function calculate() {
            const login = parseFloat(document.getElementById('loginFreq').value) || 0;
            const features = parseFloat(document.getElementById('featureUsage').value) || 0;
            const activity = parseFloat(document.getElementById('lastActivity').value) || 0;
            const tickets = parseFloat(document.getElementById('tickets').value) || 0;

            // Weighted scoring
            const loginScore = (login / 7) * 25;
            const featureScore = (features / 100) * 30;
            const activityScore = Math.max(0, (1 - activity / 30)) * 25;
            const ticketScore = Math.max(0, (1 - tickets / 5)) * 20;

            const total = loginScore + featureScore + activityScore + ticketScore;

            document.getElementById('score').textContent = Math.round(total) + '/100';
            document.getElementById('detail').textContent = 
                (total >= 80 ? 'Healthy — low churn risk' : 
                 total >= 60 ? 'Moderate — monitor closely' : 
                 total >= 40 ? 'At Risk — intervention needed' : 
                 'Critical — likely to churn');
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
</html>
