<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedback Survey — Understand Your Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-teal-500 via-cyan-500 to-blue-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">📋 Customer Feedback Survey</h1>
            <p class="opacity-90">Generate a survey template to understand your users and reduce churn.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                    <input type="text" id="product" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500" placeholder="MyApp" value="MyApp">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Survey Goal</label>
                    <select id="goal" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500">
                        <option value="churn">Reduce Churn</option>
                        <option value="product">Improve Product</option>
                        <option value="pricing">Pricing Feedback</option>
                        <option value="nps">NPS Score</option>
                    </select>
                </div>
            </div>

            <button onclick="generate()" class="w-full py-3 bg-gradient-to-r from-teal-500 to-cyan-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Survey →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-4">
                    <h3 class="font-semibold mb-4">Survey Questions:</h3>
                    <div class="space-y-4 text-sm" id="questions"></div>
                </div>
                <button onclick="copySurvey()" class="px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition">Copy Survey</button>
            </div>
        </div>
    </div>

    <script>
        function generate() {
            const product = document.getElementById('product').value;
            const goal = document.getElementById('goal').value;

            let questions;
            if (goal === 'churn') {
                questions = `
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">1. How long have you been using ${product}?</div>
                        <div class="text-gray-500">Less than 1 month / 1-3 months / 3-6 months / 6+ months</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">2. What's the primary reason you use ${product}?</div>
                        <div class="text-gray-500">Open text response</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">3. How satisfied are you with ${product}?</div>
                        <div class="text-gray-500">1-10 scale</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">4. What feature would make you stay longer?</div>
                        <div class="text-gray-500">Open text response</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">5. If you were to leave, what would be the reason?</div>
                        <div class="text-gray-500">Price / Missing features / Too complex / Found alternative / Other</div>
                    </div>`;
            } else if (goal === 'product') {
                questions = `
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">1. How often do you use ${product}?</div>
                        <div class="text-gray-500">Daily / Weekly / Monthly / Rarely</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">2. What feature do you use most?</div>
                        <div class="text-gray-500">Open text response</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">3. What's the most frustrating thing about ${product}?</div>
                        <div class="text-gray-500">Open text response</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">4. What feature would you add if you could?</div>
                        <div class="text-gray-500">Open text response</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">5. How likely are you to recommend ${product}?</div>
                        <div class="text-gray-500">0-10 (NPS)</div>
                    </div>`;
            } else if (goal === 'pricing') {
                questions = `
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">1. How do you feel about ${product}'s pricing?</div>
                        <div class="text-gray-500">Too cheap / Fair / A bit expensive / Too expensive</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">2. Which pricing model do you prefer?</div>
                        <div class="text-gray-500">Per user / Flat rate / Usage-based / Tiered</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">3. What's the maximum you'd pay for ${product}?</div>
                        <div class="text-gray-500">Open text response</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">4. Would you pay more for additional features?</div>
                        <div class="text-gray-500">Yes / No / Depends on features</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">5. What would make ${product} a "no-brainer" purchase?</div>
                        <div class="text-gray-500">Open text response</div>
                    </div>`;
            } else {
                questions = `
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">1. How likely are you to recommend ${product} to a friend?</div>
                        <div class="text-gray-500">0-10 scale</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">2. What's the main reason for your score?</div>
                        <div class="text-gray-500">Open text response</div>
                    </div>
                    <div class="p-3 bg-white rounded-lg border border-gray-200">
                        <div class="font-medium mb-1">3. What could we do to improve your experience?</div>
                        <div class="text-gray-500">Open text response</div>
                    </div>`;
            }

            document.getElementById('questions').innerHTML = questions;
            document.getElementById('output').classList.remove('hidden');
        }

        function copySurvey() {
            const text = document.getElementById('questions').innerText;
            navigator.clipboard.writeText(text);
            alert('Survey copied!');
        }
    </script>
</body>
</html>
