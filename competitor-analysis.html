<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Competitor Analysis — Track Your Competition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-slate-500 via-gray-500 to-zinc-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">🔍 SaaS Competitor Analysis</h1>
            <p class="opacity-90">Track competitors, pricing, features, and positioning.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Competitor Name</label>
                    <input type="text" id="competitor" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500" placeholder="CompetitorX" value="CompetitorX">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Their Price ($/mo)</label>
                    <input type="number" id="theirPrice" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500" placeholder="29" value="29">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Price ($/mo)</label>
                    <input type="number" id="yourPrice" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500" placeholder="19" value="19">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Their Features (count)</label>
                    <input type="number" id="theirFeatures" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500" placeholder="10" value="10">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Features (count)</label>
                    <input type="number" id="yourFeatures" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-slate-500" placeholder="5" value="5">
                </div>
            </div>

            <button onclick="analyze()" class="w-full py-3 bg-gradient-to-r from-slate-500 to-gray-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Analyze Competition →</button>

            <div id="output" class="mt-8 hidden">
                <div class="grid md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-slate-50 p-4 rounded-xl border-l-4 border-slate-500">
                        <div class="text-sm text-gray-600 mb-1">Price Advantage</div>
                        <div class="text-2xl font-bold text-slate-700" id="priceAdvantage">0%</div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border-l-4 border-gray-500">
                        <div class="text-sm text-gray-600 mb-1">Feature Gap</div>
                        <div class="text-2xl font-bold text-gray-700" id="featureGap">0</div>
                    </div>
                    <div class="bg-zinc-50 p-4 rounded-xl border-l-4 border-zinc-500">
                        <div class="text-sm text-gray-600 mb-1">Positioning</div>
                        <div class="text-2xl font-bold text-zinc-700" id="positioning">—</div>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl">
                    <h3 class="font-semibold mb-3">Recommendations:</h3>
                    <ul class="space-y-2 text-sm" id="recommendations"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function analyze() {
            const competitor = document.getElementById('competitor').value;
            const theirPrice = parseFloat(document.getElementById('theirPrice').value) || 0;
            const yourPrice = parseFloat(document.getElementById('yourPrice').value) || 0;
            const theirFeatures = parseFloat(document.getElementById('theirFeatures').value) || 0;
            const yourFeatures = parseFloat(document.getElementById('yourFeatures').value) || 0;

            const priceAdvantage = theirPrice > 0 ? ((theirPrice - yourPrice) / theirPrice * 100).toFixed(0) : 0;
            const featureGap = theirFeatures - yourFeatures;

            let positioning, recs;
            if (yourPrice < theirPrice && yourFeatures < theirFeatures) {
                positioning = 'Budget Alternative';
                recs = `<li>• You're positioned as the cheaper, simpler option. Lean into simplicity in your messaging.</li>
                        <li>• Your price is ${priceAdvantage}% lower — make this prominent on your landing page.</li>
                        <li>• You have ${featureGap} fewer features. Consider which 2-3 features would close the gap most effectively.</li>`;
            } else if (yourPrice > theirPrice && yourFeatures > theirFeatures) {
                positioning = 'Premium Option';
                recs = `<li>• You're positioned as the premium option. Emphasize quality over price.</li>
                        <li>• You charge ${Math.abs(priceAdvantage)}% more — justify this with superior features or support.</li>
                        <li>• You have ${Math.abs(featureGap)} more features. Make a comparison table highlighting this.</li>`;
            } else {
                positioning = 'Direct Competitor';
                recs = `<li>• You're a direct competitor. Differentiation needs to come from brand, support, or niche focus.</li>
                        <li>• Price difference: ${Math.abs(priceAdvantage)}%. If minimal, compete on other factors.</li>
