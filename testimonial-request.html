<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonial Request Email — Get Social Proof</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-blue-500 via-indigo-500 to-purple-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">⭐ Testimonial Request Email</h1>
            <p class="opacity-90">Generate emails to collect customer testimonials and social proof.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                    <input type="text" id="product" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="MyApp" value="MyApp">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Customer Name</label>
                    <input type="text" id="customer" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Sarah" value="Sarah">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Their Result</label>
                    <input type="text" id="result" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="saved 10 hours/week" value="saved 10 hours/week">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                    <input type="text" id="founder" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Alex" value="Alex">
                </div>
            </div>

            <button onclick="generate()" class="w-full py-3 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Email →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-4">
                    <div class="text-sm font-medium text-gray-500 mb-2">Generated Email:</div>
                    <div class="text-sm text-gray-600 whitespace-pre-wrap" id="emailText"></div>
                </div>
                <button onclick="copyEmail()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Copy Email</button>
            </div>
        </div>
    </div>

    <script>
        function generate() {
            const product = document.getElementById('product').value;
            const customer = document.getElementById('customer').value;
            const result = document.getElementById('result').value;
            const founder = document.getElementById('founder').value;

            document.getElementById('emailText').textContent = `Subject: Quick favor? Your ${product} story

Hi ${customer},

I hope ${product} is still working great for you!

I remember you mentioning that you ${result} since using it. That's exactly the kind of result we love to hear.

Would you be open to sharing a quick testimonial? It can be as simple as 2-3 sentences about your experience.

Here's what I'd use it for:
• Our landing page (to help other founders like you)
• A case study (with your permission)
• Social media (tagging you if you'd like)

No pressure at all — just thought your story could help others.

If you're up for it, just reply with a few sentences. Happy to draft something for your approval too.

Thanks ${customer}!

— ${founder}
Founder, ${product}`;

            document.getElementById('output').classList.remove('hidden');
        }

        function copyEmail() {
            const text = document.getElementById('emailText').textContent;
            navigator.clipboard.writeText(text);
            alert('Email copied!');
        }
    </script>
</body>
</html>
