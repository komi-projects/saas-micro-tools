<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Bounce Rate Calculator — Landing Page Performance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f8fafc;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            margin-top: 24px;
            display: none;
        }
        .result.active {
            display: block;
        }
        .result-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-detail {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .cta {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        @media (max-width: 600px) {
            .container { padding: 24px; }
            .result-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SaaS Bounce Rate Calculator</h1>
        <p class="subtitle">Are visitors leaving immediately?</p>

        <div class="input-group">
            <label>Total Visitors</label>
            <input type="number" id="visitors" placeholder="1000" value="1000">
        </div>

        <div class="input-group">
            <label>Visitors Who Left Without Action</label>
            <input type="number" id="bounced" placeholder="400" value="400">
        </div>

        <button class="cta" onclick="calculate()">Calculate Bounce Rate</button>

        <div class="result" id="result">
            <div class="result-label">Bounce Rate</div>
            <div class="result-value" id="rate">0%</div>
            <div class="result-detail" id="detail"></div>
        </div>
    </div>

    <script>
        function calculate() {
            const visitors = parseFloat(document.getElementById('visitors').value) || 1;
            const bounced = parseFloat(document.getElementById('bounced').value) || 0;

            const rate = (bounced / visitors) * 100;

            document.getElementById('rate').textContent = rate.toFixed(1) + '%';
            document.getElementById('detail').textContent = 
                (rate <= 30 ? 'Excellent — strong landing page' : 
                 rate <= 50 ? 'Good — acceptable for SaaS' : 
                 rate <= 70 ? 'Average — optimize messaging' : 
                 'Poor — redesign needed');
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
</html>
