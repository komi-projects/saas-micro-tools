<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy Generator — GDPR Compliant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-gray-500 via-slate-500 to-zinc-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">🔒 Privacy Policy Generator</h1>
            <p class="opacity-90">Generate a GDPR-compliant privacy policy for your SaaS.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                    <input type="text" id="company" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-500" placeholder="Acme Inc" value="Acme Inc">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Website URL</label>
                    <input type="text" id="url" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-500" placeholder="https://example.com" value="https://example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contact Email</label>
                    <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-500" placeholder="privacy@example.com" value="privacy@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Data Collected</label>
                    <select id="data" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-500">
                        <option value="basic">Basic (email, name)</option>
                        <option value="standard">Standard (+ usage data, cookies)</option>
                        <option value="full">Full (+ payment, analytics, third-party)</option>
                    </select>
                </div>
            </div>

            <button onclick="generate()" class="w-full py-3 bg-gradient-to-r from-gray-500 to-slate-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Privacy Policy →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-4">
                    <div class="text-sm font-medium text-gray-500 mb-2">Generated Privacy Policy:</div>
                    <div class="text-sm text-gray-600 whitespace-pre-wrap" id="policyText"></div>
                </div>
                <button onclick="copyPolicy()" class="px-4 py-2 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">Copy Policy</button>
            </div>
        </div>
    </div>

    <script>
        function generate() {
            const company = document.getElementById('company').value;
            const url = document.getElementById('url').value;
            const email = document.getElementById('email').value;
            const data = document.getElementById('data').value;

            let dataSection = '';
            if (data === 'basic') {
                dataSection = `We collect:
• Email address
• Name
• Account preferences`;
            } else if (data === 'standard') {
                dataSection = `We collect:
• Email address and name
• Usage data (features used, time spent)
• Cookies and analytics data
• IP address and browser information`;
            } else {
                dataSection = `We collect:
• Email address, name, and billing information
• Usage data and analytics
• Cookies and tracking data
• Payment information (processed by Stripe)
• Third-party integration data`;
            }

            document.getElementById('policyText').textContent = `Privacy Policy for ${company}

Last updated: ${new Date().toISOString().split('T')[0]}

1. Introduction
${company} ("we", "us", or "our") operates ${url} (the "Service"). This Privacy Policy explains how we collect, use, and protect your information.

2. Information We Collect
${dataSection}

3. How We Use Your Information
• To provide and maintain our Service
• To notify you about changes
• To provide customer support
• To improve our Service
• To monitor usage and detect issues

4. Data Security
We implement appropriate security measures to protect your data. However, no method of transmission over the Internet is 100% secure.

5. Your Rights (GDPR)
If you are in the EU, you have the right to:
• Access your data
• Correct inaccurate data
• Delete your data
• Restrict processing
• Data portability
• Object to processing

6. Contact Us
For privacy-related questions, contact us at ${email}.

7. Changes to This Policy
We may update this policy. We will notify you of any changes by posting the new policy on this page.`;

            document.getElementById('output').classList.remove('hidden');
        }

        function copyPolicy() {
            const text = document.getElementById('policyText').textContent;
            navigator.clipboard.writeText(text);
            alert('Privacy policy copied!');
        }
    </script>
</body>
</html>
