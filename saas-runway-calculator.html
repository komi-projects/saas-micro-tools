<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Runway Calculator — How Long Until You Run Out of Cash?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f8fafc;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            margin-top: 24px;
            display: none;
        }
        .result.active {
            display: block;
        }
        .result-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-detail {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .cta {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        @media (max-width: 600px) {
            .container { padding: 24px; }
            .result-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SaaS Runway Calculator</h1>
        <p class="subtitle">How long until you run out of cash?</p>

        <div class="input-group">
            <label>Current Cash in Bank ($)</label>
            <input type="number" id="cash" placeholder="50000" value="50000">
        </div>

        <div class="input-group">
            <label>Monthly Burn Rate ($)</label>
            <input type="number" id="burn" placeholder="10000" value="10000">
        </div>

        <div class="input-group">
            <label>Monthly Revenue ($)</label>
            <input type="number" id="revenue" placeholder="2000" value="2000">
        </div>

        <div class="input-group">
            <label>Revenue Growth Rate (%/mo)</label>
            <input type="number" id="growth" placeholder="10" value="10">
        </div>

        <button class="cta" onclick="calculate()">Calculate Runway</button>

        <div class="result" id="result">
            <div class="result-label">Months of Runway</div>
            <div class="result-value" id="runway">0</div>
            <div class="result-detail" id="detail">Run out of cash: never</div>
        </div>
    </div>

    <script>
        function calculate() {
            const cash = parseFloat(document.getElementById('cash').value) || 0;
            const burn = parseFloat(document.getElementById('burn').value) || 0;
            const revenue = parseFloat(document.getElementById('revenue').value) || 0;
            const growth = parseFloat(document.getElementById('growth').value) || 0;

            let months = 0;
            let currentCash = cash;
            let currentRevenue = revenue;
            const netBurn = burn - revenue;

            if (netBurn <= 0) {
                document.getElementById('runway').textContent = '∞';
                document.getElementById('detail').textContent = 'Profitable! You will not run out of cash.';
                document.getElementById('result').classList.add('active');
                return;
            }

            while (currentCash > 0 && months < 120) {
                currentRevenue = currentRevenue * (1 + growth / 100);
                currentCash = currentCash - (burn - currentRevenue);
                months++;
            }

            const runOutDate = new Date();
            runOutDate.setMonth(runOutDate.getMonth() + months);

            document.getElementById('runway').textContent = months;
            document.getElementById('detail').textContent = 'Run out of cash: ' + runOutDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
</html>
