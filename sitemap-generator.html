<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Sitemap Generator — Free SEO Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 2.2rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .input-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus, select:focus { outline: none; border-color: #11998e; }
        .hint { font-size: 0.85rem; color: #666; margin-top: 5px; }
        .url-list {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            resize: vertical;
        }
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .output {
            background: #1a1a2e;
            color: #a6e22e;
            padding: 25px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 20px;
        }
        .copy-btn {
            background: #11998e;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        .footer { text-align: center; color: white; margin-top: 40px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ XML Sitemap Generator</h1>
            <p>Generate sitemaps for Google Search Console</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Page URLs (one per line)</label>
                <textarea class="url-list" id="urls" placeholder="https://yoursaas.com/
https://yoursaas.com/pricing
https://yoursaas.com/features"></textarea>
            </div>

            <div class="input-group">
                <label>Change Frequency</label>
                <select id="changefreq">
                    <option value="daily">Daily</option>
                    <option value="weekly" selected>Weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                </select>
            </div>

            <div class="input-group">
                <label>Priority</label>
                <select id="priority">
                    <option value="1.0">1.0 (Highest)</option>
                    <option value="0.8" selected>0.8</option>
                    <option value="0.6">0.6</option>
                    <option value="0.4">0.4</option>
                    <option value="0.2">0.2 (Lowest)</option>
                </select>
            </div>

            <button class="generate-btn" onclick="generateSitemap()">Generate Sitemap XML</button>

            <div id="output-section" style="display:none;">
                <div class="output" id="sitemap-output"></div>
                <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
                <button class="copy-btn" onclick="downloadSitemap()" style="margin-left:10px;">Download sitemap.xml</button>
            </div>
        </div>

        <div class="footer">
            <p>Free tool by SimpleRecover | No data stored</p>
        </div>
    </div>

    <script>
        function generateSitemap() {
            const urls = document.getElementById('urls').value.trim().split('\n').filter(u => u.trim());
            const changefreq = document.getElementById('changefreq').value;
            const priority = document.getElementById('priority').value;
            const today = new Date().toISOString().split('T')[0];

            let sitemap = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">`;

            urls.forEach(url => {
                sitemap += `
    <url>
        <loc>${escapeXml(url.trim())}</loc>
        <lastmod>${today}</lastmod>
        <changefreq>${changefreq}</changefreq>
        <priority>${priority}</priority>
    </url>`;
            });

            sitemap += '\n</urlset>';

            document.getElementById('sitemap-output').textContent = sitemap;
            document.getElementById('output-section').style.display = 'block';
            document.getElementById('output-section').scrollIntoView({ behavior: 'smooth' });
        }

        function escapeXml(text) {
            return text.replace(/&/g, '&amp;')
                       .replace(/</g, '&lt;')
                       .replace(/>/g, '&gt;')
                       .replace(/"/g, '&quot;');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('sitemap-output').textContent).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
            });
        }

        function downloadSitemap() {
            const blob = new Blob([document.getElementById('sitemap-output').textContent], { type: 'application/xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'sitemap.xml';
            a.click();
        }
    </script>
</body>
</html>
