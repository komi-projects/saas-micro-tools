<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Health Score Calculator — Predict Churn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-rose-500 via-pink-500 to-purple-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">💓 Customer Health Score Calculator</h1>
            <p class="opacity-90">Predict churn risk and identify customers needing attention.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Login Frequency (days/week)</label>
                    <input type="number" id="loginFreq" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-rose-500" placeholder="5" value="5">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Feature Usage (% of features)</label>
                    <input type="number" id="featureUsage" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-rose-500" placeholder="60" value="60">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Support Tickets (last 30 days)</label>
                    <input type="number" id="supportTickets" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-rose-500" placeholder="2" value="2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">NPS Score (0-10)</label>
                    <input type="number" id="npsScore" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-rose-500" placeholder="8" value="8">
                </div>
            </div>

            <button onclick="calculateHealth()" class="w-full py-3 bg-gradient-to-r from-rose-500 to-pink-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Calculate Health Score →</button>

            <div id="output" class="mt-8 hidden space-y-6">
                <div class="grid md:grid-cols-3 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Health Score</div>
                        <div class="text-3xl font-bold" id="healthScore"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Status</div>
                        <div class="text-xl font-bold" id="healthStatus"></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <div class="text-sm text-gray-500">Churn Risk</div>
                        <div class="text-xl font-bold" id="churnRisk"></div>
                    </div>
                </div>

                <div class="bg-gray-50 p-6 rounded-xl">
                    <h3 class="font-semibold mb-3">Recommended Action</h3>
                    <div class="text-gray-700" id="recommendedAction"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateHealth() {
            const login = parseFloat(document.getElementById('loginFreq').value);
            const features = parseFloat(document.getElementById('featureUsage').value);
            const tickets = parseFloat(document.getElementById('supportTickets').value);
            const nps = parseFloat(document.getElementById('npsScore').value);

            // Calculate score (0-100)
            const loginScore = Math.min(login / 7 * 25, 25);
            const featureScore = Math.min(features / 100 * 25, 25);
            const ticketScore = Math.max(25 - tickets * 5, 0);
            const npsScore = Math.min(nps / 10 * 25, 25);
            
            const totalScore = Math.round(loginScore + featureScore + ticketScore + npsScore);

            document.getElementById('healthScore').textContent = totalScore;
            document.getElementById('healthScore').className = 'text-3xl font-bold ' + 
                (totalScore >= 80 ? 'text-green-600' : totalScore >= 60 ? 'text-yellow-600' : 'text-red-600');

            const status = totalScore >= 80 ? 'Healthy ✅' : totalScore >= 60 ? 'At Risk ⚠️' : 'Critical 🚨';
            document.getElementById('healthStatus').textContent = status;
            document.getElementById('healthStatus').className = 'text-xl font-bold ' + 
                (totalScore >= 80 ? 'text-green-600' : totalScore >= 60 ? 'text-yellow-600' : 'text-red-600');

            const risk = totalScore >= 80 ? 'Low (<5%)' : totalScore >= 60 ? 'Medium (15-25%)' : 'High (>40%)';
            document.getElementById('churnRisk').textContent = risk;

            let action = '';
            if (totalScore >= 80) {
                action = '🎉 This customer is thriving! Offer referral incentives, upsell opportunities, or ask for a testimonial.';
            } else if (totalScore >= 60) {
                action = '⚠️ Proactive outreach needed. Schedule a check-in call, send educational content about unused features, or offer a success review.';
            } else {
                action = '🚨 Immediate intervention required. Executive escalation, offer a call with founder/customer success, consider discount or pause option.';
            }
            document.getElementById('recommendedAction').textContent = action;

            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
