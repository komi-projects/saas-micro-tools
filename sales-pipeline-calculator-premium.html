<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Sales Pipeline Calculator — Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #64748b; margin-bottom: 32px; }
        .input-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .input-group {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            background: #0f0f1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
        }
        .calculate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 32px;
        }
        .results { display: none; }
        .results.show { display: block; }
        .result-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
        }
        .result-card h3 { font-size: 0.9rem; color: #94a3b8; margin-bottom: 8px; }
        .result-value { font-size: 2rem; font-weight: 700; color: #6366f1; }
        .unlock-section {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            margin-top: 32px;
        }
        .stripe-btn {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
        }
        @media (max-width: 768px) {
            .input-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Sales Pipeline Calculator</h1>
        <p class="subtitle">Calculate pipeline coverage, conversion rates, and revenue forecast.</p>
        
        <div class="input-grid">
            <div class="input-group">
                <label>Leads per Month</label>
                <input type="number" id="leads" value="100" placeholder="100">
            </div>
            <div class="input-group">
                <label>Lead-to-Opportunity (%)</label>
                <input type="number" id="leadConversion" value="25" placeholder="25">
            </div>
            <div class="input-group">
                <label>Win Rate (%)</label>
                <input type="number" id="winRate" value="20" placeholder="20">
            </div>
            <div class="input-group">
                <label>Average Deal Size ($)</label>
                <input type="number" id="dealSize" value="5000" placeholder="5000">
            </div>
        </div>
        
        <button class="calculate-btn" onclick="calculate()">Calculate Pipeline</button>
        
        <div class="results" id="results">
            <div class="result-card">
                <h3>Monthly Revenue Forecast</h3>
                <div class="result-value" id="forecast">$25,000</div>
            </div>
            <div class="result-card">
                <h3>Pipeline Coverage</h3>
                <div class="result-value" id="coverage">3x</div>
            </div>
            <div class="result-card">
                <h3>Deals Needed to Hit $100K</h3>
                <div class="result-value" id="dealsNeeded">20</div>
            </div>
            
            <div class="unlock-section">
                <h2>🔓 Unlock Full Pipeline Analysis</h2>
                <p>Get detailed pipeline modeling with stage-by-stage conversion.</p>
                <div style="font-size: 2.5rem; font-weight: 700; color: #6366f1; margin-bottom: 16px;">$9</div>
                <form id="emailForm" style="display: flex; gap: 12px; max-width: 400px; margin: 0 auto 16px;">
                    <input type="email" placeholder="your@email.com" required style="flex: 1; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e2e8f0;">
                    <button type="submit" class="stripe-btn">Get Full Report — $9</button>
                </form>
            </div>
        </div>
    </div>
    
    <script>
        function calculate() {
            const leads = parseFloat(document.getElementById('leads').value) || 0;
            const leadConv = parseFloat(document.getElementById('leadConversion').value) || 0;
            const winRate = parseFloat(document.getElementById('winRate').value) || 0;
            const dealSize = parseFloat(document.getElementById('dealSize').value) || 0;
            
            const opportunities = leads * (leadConv / 100);
            const deals = opportunities * (winRate / 100);
            const forecast = deals * dealSize;
            const coverage = deals > 0 ? (opportunities / deals).toFixed(1) + 'x' : 'N/A';
            const dealsFor100k = dealSize > 0 ? Math.ceil(100000 / dealSize) : 0;
            
            document.getElementById('forecast').textContent = '$' + forecast.toLocaleString();
            document.getElementById('coverage').textContent = coverage;
            document.getElementById('dealsNeeded').textContent = dealsFor100k.toLocaleString();
            
            document.getElementById('results').classList.add('show');
        }
        
        document.getElementById('emailForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = this.querySelector('input[type="email"]').value;
            localStorage.setItem('pipelineReportEmail', email);
            alert('✅ Payment link coming soon! We\'ll email you when checkout is live.');
            this.reset();
        });
    </script>
</body>
</html>
