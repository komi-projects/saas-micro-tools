<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page SEO Checklist — Rank Higher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-green-500 via-emerald-500 to-teal-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">🔍 Landing Page SEO Checklist</h1>
            <p class="opacity-90">Make sure your SaaS landing page ranks on Google.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4 text-green-600">Technical SEO</h2>
                <div class="space-y-3">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-green-600 rounded mr-3">
                        <span class="group-hover:text-green-600 transition"><strong>Title tag</strong> under 60 chars, includes primary keyword</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-green-600 rounded mr-3">
                        <span class="group-hover:text-green-600 transition"><strong>Meta description</strong> under 160 chars, compelling CTA</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-green-600 rounded mr-3">
                        <span class="group-hover:text-green-600 transition"><strong>H1 tag</strong> includes primary keyword, only one per page</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-green-600 rounded mr-3">
                        <span class="group-hover:text-green-600 transition"><strong>Canonical URL</strong> set correctly</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-green-600 rounded mr-3">
                        <span class="group-hover:text-green-600 transition"><strong>Mobile responsive</strong> — test on multiple devices</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-green-600 rounded mr-3">
                        <span class="group-hover:text-green-600 transition"><strong>Page speed</strong> < 3 seconds (test on PageSpeed Insights)</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-green-600 rounded mr-3">
                        <span class="group-hover:text-green-600 transition"><strong>SSL/HTTPS</strong> enabled</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-green-600 rounded mr-3">
                        <span class="group-hover:text-green-600 transition"><strong>Sitemap.xml</strong> submitted to Google Search Console</span>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4 text-emerald-600">On-Page SEO</h2>
                <div class="space-y-3">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-emerald-600 rounded mr-3">
                        <span class="group-hover:text-emerald-600 transition"><strong>Primary keyword</strong> in first 100 words</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-emerald-600 rounded mr-3">
                        <span class="group-hover:text-emerald-600 transition"><strong>Keyword in URL</strong> (short, descriptive)</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-emerald-600 rounded mr-3">
                        <span class="group-hover:text-emerald-600 transition"><strong>Alt text</strong> on all images (descriptive, keyword where natural)</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-emerald-600 rounded mr-3">
                        <span class="group-hover:text-emerald-600 transition"><strong>Internal links</strong> to related pages (3-5 per page)</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-emerald-600 rounded mr-3">
                        <span class="group-hover:text-emerald-600 transition"><strong>Schema markup</strong> (SoftwareApplication, Organization)</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-emerald-600 rounded mr-3">
                        <span class="group-hover:text-emerald-600 transition"><strong>Social sharing tags</strong> (Open Graph, Twitter Cards)</span>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4 text-teal-600">Content SEO</h2>
                <div class="space-y-3">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-teal-600 rounded mr-3">
                        <span class="group-hover:text-teal-600 transition"><strong>Blog content</strong> targeting long-tail keywords</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-teal-600 rounded mr-3">
                        <span class="group-hover:text-teal-600 transition"><strong>FAQ section</strong> on landing page (targets voice search)</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-teal-600 rounded mr-3">
                        <span class="group-hover:text-teal-600 transition"><strong>Comparison pages</strong> ("[Your tool] vs [Competitor]")</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-teal-600 rounded mr-3">
                        <span class="group-hover:text-teal-600 transition"><strong>Use case pages</strong> ("How to [outcome] with [tool]")</span>
                    </label>
                </div>
            </div>

            <div class="mt-8 p-4 bg-gray-50 rounded-xl">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-semibold">Progress:</span>
                    <span class="font-bold text-green-600" id="progress">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div id="progressBar" class="bg-gradient-to-r from-green-500 to-teal-500 h-3 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateProgress() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const checked = document.querySelectorAll('input[type="checkbox"]:checked');
            const percent = Math.round((checked.length / checkboxes.length) * 100);
            document.getElementById('progress').textContent = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
        }

        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', updateProgress);
        });
    </script>
</body>
</html>
