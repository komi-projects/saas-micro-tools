<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Slug Optimizer — Free SEO Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 2.2rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .input-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #4facfe; }
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .result-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .slug-result {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            color: #1a1a2e;
            word-break: break-all;
        }
        .score {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 10px;
        }
        .score-good { background: #d4edda; color: #155724; }
        .score-ok { background: #fff3cd; color: #856404; }
        .score-bad { background: #f8d7da; color: #721c24; }
        .tips {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 8px;
        }
        .tips h3 { margin-bottom: 10px; }
        .tips ul { margin-left: 20px; }
        .copy-btn {
            background: #4facfe;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        .footer { text-align: center; color: white; margin-top: 40px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 URL Slug Optimizer</h1>
            <p>Create SEO-friendly URL slugs</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Enter Title or Text</label>
                <input type="text" id="input-text" placeholder="e.g. How to Recover Failed Payments Automatically">
            </div>

            <button class="generate-btn" onclick="optimizeSlug()">Generate SEO Slug</button>

            <div id="output-section" style="display:none;">
                <div class="result-box">
                    <label>Optimized Slug:</label>
                    <div class="slug-result" id="slug-output"></div>
                    <div id="score-badge"></div>
                    <button class="copy-btn" onclick="copyToClipboard()">Copy Slug</button>
                </div>

                <div class="tips">
                    <h3>SEO Tips</h3>
                    <ul id="tips-list"></ul>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Free tool by SimpleRecover | No data stored</p>
        </div>
    </div>

    <script>
        function optimizeSlug() {
            const input = document.getElementById('input-text').value;
            if (!input.trim()) return;

            // Convert to slug
            let slug = input.toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');

            // Truncate if too long
            const originalSlug = slug;
            if (slug.length > 60) {
                slug = slug.substring(0, 60).replace(/-[^-]*$/, '');
            }

            document.getElementById('slug-output').textContent = slug;
            document.getElementById('output-section').style.display = 'block';

            // Calculate score
            let score = 100;
            let tips = [];

            if (originalSlug.length > 60) {
                score -= 20;
                tips.push('Slug is too long (ideal: under 60 chars)');
            }
            if (slug.split('-').length > 6) {
                score -= 15;
                tips.push('Too many words (ideal: 3-6 words)');
            }
            if (/^\d/.test(slug)) {
                score -= 10;
                tips.push('Avoid starting with numbers');
            }
            if (slug.includes('and') || slug.includes('or') || slug.includes('the')) {
                score -= 5;
                tips.push('Remove stop words (and, or, the)');
            }

            if (score >= 80) {
                document.getElementById('score-badge').innerHTML = '<span class="score score-good">Score: ' + score + '/100 — Great!</span>';
            } else if (score >= 60) {
                document.getElementById('score-badge').innerHTML = '<span class="score score-ok">Score: ' + score + '/100 — Good</span>';
            } else {
                document.getElementById('score-badge').innerHTML = '<span class="score score-bad">Score: ' + score + '/100 — Needs Improvement</span>';
            }

            if (tips.length === 0) {
                tips.push('Perfect slug! Keep it up.');
            }

            document.getElementById('tips-list').innerHTML = tips.map(t => '<li>' + t + '</li>').join('');
            document.getElementById('output-section').scrollIntoView({ behavior: 'smooth' });
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('slug-output').textContent).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy Slug', 2000);
            });
        }
    </script>
</body>
</html>
