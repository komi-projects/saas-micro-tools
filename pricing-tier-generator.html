<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Pricing Tier Generator — Good-Better-Best</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-violet-500 via-purple-500 to-fuchsia-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">💎 SaaS Pricing Tier Generator</h1>
            <p class="opacity-90">Generate Good-Better-Best pricing tiers for your SaaS.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Base Cost per User ($)</label>
                    <input type="number" id="baseCost" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="5" value="5">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Target Margin (%)</label>
                    <input type="number" id="margin" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="80" value="80">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                    <input type="text" id="product" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="MyApp" value="MyApp">
                </div>
            </div>

            <button onclick="generate()" class="w-full py-3 bg-gradient-to-r from-violet-500 to-purple-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Pricing Tiers →</button>

            <div id="output" class="mt-8 hidden">
                <div class="grid md:grid-cols-3 gap-4 mb-6">
                    <!-- Starter -->
                    <div class="border border-gray-200 rounded-xl p-6">
                        <div class="text-sm font-medium text-gray-500 mb-1">Starter</div>
                        <div class="text-3xl font-bold mb-1" id="starterPrice">$0</div>
                        <div class="text-sm text-gray-500 mb-4">per month</div>
                        <ul class="space-y-2 text-sm" id="starterFeatures"></ul>
                    </div>

                    <!-- Pro (highlighted) -->
                    <div class="border-2 border-purple-500 rounded-xl p-6 relative">
                        <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 px-3 py-1 bg-purple-500 text-white text-xs font-bold rounded-full">RECOMMENDED</div>
                        <div class="text-sm font-medium text-purple-600 mb-1">Pro</div>
                        <div class="text-3xl font-bold mb-1" id="proPrice">$0</div>
                        <div class="text-sm text-gray-500 mb-4">per month</div>
                        <ul class="space-y-2 text-sm" id="proFeatures"></ul>
                    </div>

                    <!-- Enterprise -->
                    <div class="border border-gray-200 rounded-xl p-6">
                        <div class="text-sm font-medium text-gray-500 mb-1">Enterprise</div>
                        <div class="text-3xl font-bold mb-1" id="enterprisePrice">$0</div>
                        <div class="text-sm text-gray-500 mb-4">per month</div>
                        <ul class="space-y-2 text-sm" id="enterpriseFeatures"></ul>
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl">
                    <h3 class="font-semibold mb-3">Pricing Strategy Notes:</h3>
                    <ul class="space-y-2 text-sm text-gray-600" id="notes"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function generate() {
            const baseCost = parseFloat(document.getElementById('baseCost').value) || 5;
            const margin = parseFloat(document.getElementById('margin').value) || 80;
            const product = document.getElementById('product').value;

            const multiplier = 1 / (1 - margin / 100);
            const starterPrice = Math.ceil(baseCost * multiplier * 2);
            const proPrice = Math.ceil(baseCost * multiplier * 4);
            const enterprisePrice = Math.ceil(baseCost * multiplier * 8);

            document.getElementById('starterPrice').textContent = '$' + starterPrice + '/mo';
            document.getElementById('proPrice').textContent = '$' + proPrice + '/mo';
            document.getElementById('enterprisePrice').textContent = '$' + enterprisePrice + '/mo';

            document.getElementById('starterFeatures').innerHTML = `
                <li class="flex items-center">✓ 1 user</li>
                <li class="flex items-center">✓ Basic features</li>
                <li class="flex items-center">✓ Email support</li>
                <li class="flex items-center text-gray-400">— No API access</li>
            `;

            document.getElementById('proFeatures').innerHTML = `
                <li class="flex items-center">✓ 5 users</li>
                <li class="flex items-center">✓ All features</li>
                <li class="flex items-center">✓ Priority support</li>
                <li class="flex items-center">✓ API access</li>
            `;

            document.getElementById('enterpriseFeatures').innerHTML = `
                <li class="flex items-center">✓ Unlimited users</li>
                <li class="flex items-center">✓ Custom features</li>
                <li class="flex items-center">✓ Dedicated support</li>
                <li class="flex items-center">✓ SLA guarantee</li>
            `;

            document.getElementById('notes').innerHTML = `
                <li>Your Pro tier is ${Math.round(proPrice/starterPrice*100)}% higher than Starter — this is the sweet spot for conversion.</li>
                <li>Enterprise is ${Math.round(enterprisePrice/proPrice*100)}% higher than Pro — captures 10-15% of users who need "everything."</li>
                <li>At ${margin}% margin, your unit economics are healthy. If CAC exceeds $${Math.round(starterPrice * 3)}, reconsider pricing.</li>
            `;

            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
