<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Acquisition Cost Calculator — SaaS CAC Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f8fafc;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            margin-top: 24px;
            display: none;
        }
        .result.active {
            display: block;
        }
        .result-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-detail {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .cta {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        @media (max-width: 600px) {
            .container { padding: 24px; }
            .result-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Customer Acquisition Cost Calculator</h1>
        <p class="subtitle">Calculate your CAC and see if it's sustainable</p>

        <div class="input-group">
            <label>Total Marketing Spend (monthly)</label>
            <input type="number" id="marketing" placeholder="5000" value="5000">
        </div>

        <div class="input-group">
            <label>Total Sales Spend (monthly)</label>
            <input type="number" id="sales" placeholder="3000" value="3000">
        </div>

        <div class="input-group">
            <label>New Customers Acquired (monthly)</label>
            <input type="number" id="customers" placeholder="50" value="50">
        </div>

        <div class="input-group">
            <label>Average Customer LTV ($)</label>
            <input type="number" id="ltv" placeholder="2000" value="2000">
        </div>

        <button class="cta" onclick="calculate()">Calculate CAC</button>

        <div class="result" id="result">
            <div class="result-label">Customer Acquisition Cost</div>
            <div class="result-value" id="cac">$0</div>
            <div class="result-detail" id="ratio">LTV:CAC ratio: 0:1</div>
        </div>
    </div>

    <script>
        function calculate() {
            const marketing = parseFloat(document.getElementById('marketing').value) || 0;
            const sales = parseFloat(document.getElementById('sales').value) || 0;
            const customers = parseFloat(document.getElementById('customers').value) || 1;
            const ltv = parseFloat(document.getElementById('ltv').value) || 0;

            const cac = (marketing + sales) / customers;
            const ratio = ltv / cac;

            document.getElementById('cac').textContent = '$' + Math.round(cac);
            document.getElementById('ratio').textContent = 'LTV:CAC ratio: ' + ratio.toFixed(1) + ':1' + 
                (ratio >= 3 ? ' (healthy)' : ratio >= 1 ? ' (acceptable)' : ' (unsustainable)');
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
</html>
