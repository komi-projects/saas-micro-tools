<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Persona Generator — Know Your Customer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-amber-500 via-orange-500 to-red-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">👤 User Persona Generator</h1>
            <p class="opacity-90">Create detailed user personas for your SaaS in minutes.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Persona Name</label>
                    <input type="text" id="personaName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" placeholder="SaaS Founder Sarah">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                    <input type="text" id="role" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" placeholder="Indie SaaS Founder">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Age Range</label>
                    <input type="text" id="age" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" placeholder="28-35">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Income Level</label>
                    <input type="text" id="income" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" placeholder="$5K-15K MRR">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Goals (one per line)</label>
                <textarea id="goals" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 h-20" placeholder="Reduce churn by 20%
Automate payment recovery
Focus on product instead of billing"></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Pain Points (one per line)</label>
                <textarea id="painPoints" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 h-20" placeholder="Manually chasing failed payments
Losing revenue to involuntary churn
No time to build internal tools"></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Tools They Use</label>
                <input type="text" id="tools" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" placeholder="Stripe, Notion, Slack, VS Code">
            </div>

            <button onclick="generate()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Persona →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-4">
                    <div class="text-sm font-medium text-gray-500 mb-2">Generated Persona:</div>
                    <div class="text-sm text-gray-600 whitespace-pre-wrap" id="personaText"></div>
                </div>
                <button onclick="copyPersona()" class="px-4 py-2 bg-amber-600 text-white rounded-lg hover:bg-amber-700 transition">Copy Persona</button>
            </div>
        </div>
    </div>

    <script>
        function generate() {
            const name = document.getElementById('personaName').value;
            const role = document.getElementById('role').value;
            const age = document.getElementById('age').value;
            const income = document.getElementById('income').value;
            const goals = document.getElementById('goals').value;
            const painPoints = document.getElementById('painPoints').value;
            const tools = document.getElementById('tools').value;

            document.getElementById('personaText').textContent = `# ${name}

**Role:** ${role}
**Age:** ${age}
**Income:** ${income}

## Goals
${goals.split('\n').map(g => `• ${g}`).join('\n')}

## Pain Points
${painPoints.split('\n').map(p => `• ${p}`).join('\n')}

## Tools They Use
${tools}

## Key Quote
"I need something that works without me thinking about it."

## How We Reach Them
• Indie Hackers, Twitter, Hacker News
• SaaS podcasts and newsletters
• Stripe partner directory
• Word of mouth from other founders`;

            document.getElementById('output').classList.remove('hidden');
        }

        function copyPersona() {
            const text = document.getElementById('personaText').textContent;
            navigator.clipboard.writeText(text);
            alert('Persona copied!');
        }
    </script>
</body>
</html>
