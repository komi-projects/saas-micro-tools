<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Database Size Calculator — Storage Planning</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f8fafc;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            margin-top: 24px;
            display: none;
        }
        .result.active {
            display: block;
        }
        .result-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-detail {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .cta {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        @media (max-width: 600px) {
            .container { padding: 24px; }
            .result-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SaaS Database Size Calculator</h1>
        <p class="subtitle">Estimate your storage needs as you scale</p>

        <div class="input-group">
            <label>Data Per User (MB)</label>
            <input type="number" id="perUser" placeholder="10" value="10">
        </div>

        <div class="input-group">
            <label>Current Users</label>
            <input type="number" id="users" placeholder="1000" value="1000">
        </div>

        <div class="input-group">
            <label>Growth Rate (%/month)</label>
            <input type="number" id="growth" placeholder="10" value="10">
        </div>

        <div class="input-group">
            <label>Months to Project</label>
            <input type="number" id="months" placeholder="12" value="12">
        </div>

        <button class="cta" onclick="calculate()">Calculate DB Size</button>

        <div class="result" id="result">
            <div class="result-label">Projected Database Size</div>
            <div class="result-value" id="size">0 GB</div>
            <div class="result-detail" id="detail"></div>
        </div>
    </div>

    <script>
        function calculate() {
            const perUser = parseFloat(document.getElementById('perUser').value) || 0;
            const users = parseFloat(document.getElementById('users').value) || 0;
            const growth = parseFloat(document.getElementById('growth').value) || 0;
            const months = parseFloat(document.getElementById('months').value) || 0;

            let totalSize = 0;
            let currentUsers = users;
            for (let i = 0; i < months; i++) {
                totalSize += currentUsers * perUser;
                currentUsers *= (1 + growth / 100);
            }

            const sizeGB = totalSize / 1024;

            document.getElementById('size').textContent = sizeGB.toFixed(1) + ' GB';
            document.getElementById('detail').textContent = 
                'After ' + months + ' months with ' + growth + '% monthly growth';
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
</html>
