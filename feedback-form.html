<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form — Collect Actionable Insights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-violet-500 to-purple-500 min-h-screen py-10 px-4">
    <div class="max-w-2xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">📝 User Feedback Form</h1>
            <p class="opacity-90">Collect actionable insights from your SaaS users.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <form class="space-y-6" onsubmit="event.preventDefault(); alert('Thank you for your feedback! (This is a demo form)');">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">How satisfied are you with our product?</label>
                    <div class="flex gap-4">
                        <label class="flex items-center"><input type="radio" name="satisfaction" class="mr-2"> Very Satisfied</label>
                        <label class="flex items-center"><input type="radio" name="satisfaction" class="mr-2"> Satisfied</label>
                        <label class="flex items-center"><input type="radio" name="satisfaction" class="mr-2"> Neutral</label>
                        <label class="flex items-center"><input type="radio" name="satisfaction" class="mr-2"> Dissatisfied</label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">What feature do you use most?</label>
                    <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Smart Retries">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">What's your biggest pain point?</label>
                    <textarea class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 h-24" placeholder="Describe the problem..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">What would you like to see next?</label>
                    <textarea class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 h-24" placeholder="Feature requests, improvements..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Would you recommend us to a friend?</label>
                    <div class="flex gap-4">
                        <label class="flex items-center"><input type="radio" name="recommend" class="mr-2"> Definitely</label>
                        <label class="flex items-center"><input type="radio" name="recommend" class="mr-2"> Maybe</label>
                        <label class="flex items-center"><input type="radio" name="recommend" class="mr-2"> No</label>
                    </div>
                </div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-violet-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Submit Feedback →</button>
            </form>
        </div>
    </div>
</body>
</html>
