<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Invoice Template — Get Paid Faster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-emerald-500 via-green-500 to-teal-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">🧾 Freelance Invoice Template</h1>
            <p class="opacity-90">Generate a professional invoice in seconds.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Name/Business</label>
                    <input type="text" id="yourName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Your Name" value="Your Name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Client Name</label>
                    <input type="text" id="clientName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Acme Corp" value="Acme Corp">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Service Description</label>
                    <input type="text" id="serviceDesc" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Stripe integration" value="Stripe integration">
                </div>
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Hours Worked</label>
                        <input type="number" id="hours" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="10" value="10">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Hourly Rate ($)</label>
                        <input type="number" id="rate" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="300" value="300">
                    </div>
                </div>
            </div>

            <button onclick="generateInvoice()" class="w-full py-3 bg-gradient-to-r from-emerald-500 to-green-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Invoice →</button>

            <div id="output" class="mt-8 hidden">
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div class="text-sm font-medium text-gray-500 mb-2">Generated Invoice:</div>
                    <div class="text-gray-700 whitespace-pre-wrap text-sm" id="invoiceText"></div>
                </div>
                <button onclick="copyInvoice()" class="mt-4 w-full py-3 bg-emerald-600 text-white rounded-lg font-semibold hover:bg-emerald-700 transition">Copy Invoice</button>
            </div>
        </div>
    </div>

    <script>
        function generateInvoice() {
            const yourName = document.getElementById('yourName').value;
            const client = document.getElementById('clientName').value;
            const service = document.getElementById('serviceDesc').value;
            const hours = document.getElementById('hours').value;
            const rate = document.getElementById('rate').value;
            const total = hours * rate;

            const invoice = `INVOICE

From: ${yourName}
To: ${client}
Date: ${new Date().toLocaleDateString()}
Invoice #: INV-${Date.now().toString().slice(-6)}

Description                  Hours    Rate      Amount
------------------------------------------------------------
${service}                    ${hours}     $${rate}      $${total}

                            Subtotal: $${total}
                            Tax (0%): $0.00
                            TOTAL: $${total}

Payment Terms: Due within 14 days
Payment Method: Bank transfer or Stripe

Thank you for your business!`;

            document.getElementById('invoiceText').textContent = invoice;
            document.getElementById('output').classList.remove('hidden');
        }

        function copyInvoice() {
            navigator.clipboard.writeText(document.getElementById('invoiceText').textContent);
            alert('Invoice copied!');
        }
    </script>
</body>
</html>
