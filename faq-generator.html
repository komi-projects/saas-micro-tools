<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page FAQ Generator — Answer Objections Before They Ask</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-sky-500 via-blue-500 to-indigo-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">❓ Landing Page FAQ Generator</h1>
            <p class="opacity-90">Generate FAQs that address the top objections visitors have before signing up.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Your Product Name</label>
                <input type="text" id="productName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500" placeholder="SimpleRecover" value="SimpleRecover">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">What it does</label>
                <input type="text" id="whatItDoes" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500" placeholder="recovers failed Stripe payments" value="recovers failed Stripe payments">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Pricing</label>
                <input type="text" id="pricing" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-sky-500" placeholder="$19/month" value="$19/month">
            </div>

            <button onclick="generateFAQs()" class="w-full py-3 bg-gradient-to-r from-sky-500 to-blue-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate FAQs →</button>

            <div id="output" class="mt-8 hidden space-y-4">
                <div class="bg-gray-50 p-6 rounded-xl" id="faqContent"></div>
                <button onclick="copyFAQs()" class="w-full py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition">Copy All FAQs</button>
            </div>
        </div>
    </div>

    <script>
        function generateFAQs() {
            const product = document.getElementById('productName').value;
            const does = document.getElementById('whatItDoes').value;
            const price = document.getElementById('pricing').value;

            const faqs = [
                { q: `How does ${product} work?`, a: `${product} connects to your Stripe account and automatically ${does}. Setup takes 5 minutes, and it runs 24/7.` },
                { q: `How much does it cost?`, a: `${product} is ${price}. No hidden fees, no setup costs, no surprises.` },
                { q: `Do I need a credit card to try it?`, a: `No. Start with a 14-day free trial. No credit card required until you decide to upgrade.` },
                { q: `Can I cancel anytime?`, a: `Absolutely. Cancel with one click. No contracts, no cancellation fees.` },
                { q: `Is my data secure?`, a: `Yes. We use bank-level encryption, never store payment details, and are SOC 2 compliant.` },
                { q: `What if it doesn't work for me?`, a: `We offer a 30-day money-back guarantee. If you're not satisfied, we'll refund every penny.` },
                { q: `How long does setup take?`, a: `Most customers are up and running in under 5 minutes. Connect Stripe, set your preferences, done.` },
                { q: `Do you offer support?`, a: `Yes. Email support with 24-hour response time. Pro plans include priority support with 2-hour response.` }
            ];

            document.getElementById('faqContent').innerHTML = faqs.map(f => `
                <div class="mb-4">
                    <div class="font-semibold text-gray-800 mb-1">Q: ${f.q}</div>
                    <div class="text-gray-600">A: ${f.a}</div>
                </div>
            `).join('');
            document.getElementById('output').classList.remove('hidden');
        }

        function copyFAQs() {
            const faqs = document.querySelectorAll('#faqContent > div');
            const text = Array.from(faqs).map(f => f.textContent).join('\n\n');
            navigator.clipboard.writeText(text);
            alert('FAQs copied!');
        }
    </script>
</body>
</html>
