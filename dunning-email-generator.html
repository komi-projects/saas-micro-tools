<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dunning Email Generator — Recover Failed Payments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-orange-500 via-red-500 to-pink-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">💳 Dunning Email Generator</h1>
            <p class="opacity-90">Generate recovery emails for failed subscription payments.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                    <input type="text" id="company" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" placeholder="Acme Inc" value="Acme Inc">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Customer Name</label>
                    <input type="text" id="customer" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" placeholder="John" value="John">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                    <input type="text" id="product" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" placeholder="Pro Plan" value="Pro Plan">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Amount Due ($)</label>
                    <input type="number" id="amount" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" placeholder="29" value="29">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Email Tone</label>
                <div class="flex gap-3">
                    <button onclick="setTone('friendly')" id="btn-friendly" class="px-4 py-2 bg-orange-100 text-orange-700 rounded-lg font-medium">Friendly</button>
                    <button onclick="setTone('urgent')" id="btn-urgent" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg font-medium">Urgent</button>
                    <button onclick="setTone('final')" id="btn-final" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg font-medium">Final Notice</button>
                </div>
            </div>

            <button onclick="generate()" class="w-full py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Generate Email →</button>

            <div id="output" class="mt-8 hidden">
                <h3 class="font-semibold mb-3">Generated Email:</h3>
                <div class="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-4">
                    <div id="emailPreview" class="prose"></div>
                </div>
                <button onclick="copyEmail()" class="px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition">Copy Email</button>
            </div>
        </div>

        <div class="bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-2xl p-6 text-center">
            <h2 class="text-xl font-bold mb-2">Tired of writing dunning emails?</h2>
            <p class="opacity-90 mb-4">SimpleRecover automates failed payment recovery. $19/mo flat.</p>
            <a href="#" class="inline-block px-6 py-3 bg-white text-orange-600 rounded-lg font-semibold hover:bg-gray-100 transition">Learn More →</a>
        </div>
    </div>

    <script>
        let tone = 'friendly';

        function setTone(t) {
            tone = t;
            document.getElementById('btn-friendly').className = t === 'friendly' ? 'px-4 py-2 bg-orange-100 text-orange-700 rounded-lg font-medium' : 'px-4 py-2 bg-gray-100 text-gray-600 rounded-lg font-medium';
            document.getElementById('btn-urgent').className = t === 'urgent' ? 'px-4 py-2 bg-orange-100 text-orange-700 rounded-lg font-medium' : 'px-4 py-2 bg-gray-100 text-gray-600 rounded-lg font-medium';
            document.getElementById('btn-final').className = t === 'final' ? 'px-4 py-2 bg-orange-100 text-orange-700 rounded-lg font-medium' : 'px-4 py-2 bg-gray-100 text-gray-600 rounded-lg font-medium';
        }

        function generate() {
            const company = document.getElementById('company').value;
            const customer = document.getElementById('customer').value;
            const product = document.getElementById('product').value;
            const amount = document.getElementById('amount').value;

            let subject, body;

            if (tone === 'friendly') {
                subject = `Oops — your ${product} payment didn't go through`;
                body = `Hi ${customer},

We noticed your recent payment for ${product} didn't go through. This usually happens when:
• A credit card expires
• A bank issues a new card
• Billing address changes

Your account is still active, but we wanted to give you a heads up so there's no interruption.

Amount due: $${amount}
Update payment method: [PAYMENT_LINK]

If you need help, just reply to this email.

Thanks for being a ${company} customer!

— The ${company} Team`;
            } else if (tone === 'urgent') {
                subject = `Action required: Update your payment method`;
                body = `Hi ${customer},

Your ${product} subscription payment of $${amount} failed. We've tried processing it multiple times.

To avoid service interruption, please update your payment method within 48 hours:

[PAYMENT_LINK]

If you've already updated it, you can ignore this email.

Questions? Reply to this email.

— ${company} Billing`;
            } else {
                subject = `Final notice: Payment required to keep ${product} active`;
                body = `Hi ${customer},

This is our final notice regarding your ${product} subscription.

Amount due: $${amount}
Payment attempts: 3

Your account will be downgraded in 24 hours if payment is not received.

Update payment now: [PAYMENT_LINK]

We'd hate to see you go. If there's anything we can do to help, let us know.

— ${company} Team`;
            }

            document.getElementById('emailPreview').innerHTML = `
                <div class="mb-2"><strong>Subject:</strong> ${subject}</div>
                <hr class="my-3">
                <div class="whitespace-pre-wrap">${body}</div>
            `;
            document.getElementById('output').classList.remove('hidden');
        }

        function copyEmail() {
            const text = document.getElementById('emailPreview').innerText;
            navigator.clipboard.writeText(text);
            alert('Email copied!');
        }
    </script>
</body>
</html>
