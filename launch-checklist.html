<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Launch Checklist — Don't Miss Anything</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-blue-500 via-indigo-500 to-violet-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">✅ SaaS Launch Checklist</h1>
            <p class="opacity-90">Everything you need before, during, and after launch.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4 text-indigo-600">Pre-Launch (2-4 weeks before)</h2>
                <div class="space-y-3">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-indigo-600 rounded mr-3">
                        <span class="group-hover:text-indigo-600 transition">Landing page with email capture</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-indigo-600 rounded mr-3">
                        <span class="group-hover:text-indigo-600 transition">Stripe billing set up</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-indigo-600 rounded mr-3">
                        <span class="group-hover:text-indigo-600 transition">Privacy policy & terms of service</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-indigo-600 rounded mr-3">
                        <span class="group-hover:text-indigo-600 transition">Google Analytics installed</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-indigo-600 rounded mr-3">
                        <span class="group-hover:text-indigo-600 transition">Social media accounts created</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-indigo-600 rounded mr-3">
                        <span class="group-hover:text-indigo-600 transition">Beta testers recruited (10-20)</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-indigo-600 rounded mr-3">
                        <span class="group-hover:text-indigo-600 transition">Help docs / knowledge base</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-indigo-600 rounded mr-3">
                        <span class="group-hover:text-indigo-600 transition">Email sequences (welcome, activation, churn)</span>
                    </label>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4 text-purple-600">Launch Day</h2>
                <div class="space-y-3">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-purple-600 rounded mr-3">
                        <span class="group-hover:text-purple-600 transition">Product Hunt launch posted at 12:01 AM PST</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-purple-600 rounded mr-3">
                        <span class="group-hover:text-purple-600 transition">Twitter thread announcing launch</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-purple-600 rounded mr-3">
                        <span class="group-hover:text-purple-600 transition">Email blast to waiting list</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-purple-600 rounded mr-3">
                        <span class="group-hover:text-purple-600 transition">Indie Hackers post</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-purple-600 rounded mr-3">
                        <span class="group-hover:text-purple-600 transition">Hacker News "Show HN" post</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-purple-600 rounded mr-3">
                        <span class="group-hover:text-purple-600 transition">Reddit posts in relevant subreddits</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-purple-600 rounded mr-3">
                        <span class="group-hover:text-purple-600 transition">Monitor and respond to all comments/questions</span>
                    </label>
                </div>
            </div>

            <div>
                <h2 class="text-xl font-bold mb-4 text-pink-600">Post-Launch (1-4 weeks after)</h2>
                <div class="space-y-3">
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-pink-600 rounded mr-3">
                        <span class="group-hover:text-pink-600 transition">Follow up with beta testers for testimonials</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-pink-600 rounded mr-3">
                        <span class="group-hover:text-pink-600 transition">Analyze launch metrics (traffic, signups, conversions)</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-pink-600 rounded mr-3">
                        <span class="group-hover:text-pink-600 transition">Fix critical bugs reported</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-pink-600 rounded mr-3">
                        <span class="group-hover:text-pink-600 transition">Write launch retrospective blog post</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-pink-600 rounded mr-3">
                        <span class="group-hover:text-pink-600 transition">Start content marketing (1 post/week)</span>
                    </label>
                    <label class="flex items-center cursor-pointer group">
                        <input type="checkbox" class="w-5 h-5 text-pink-600 rounded mr-3">
                        <span class="group-hover:text-pink-600 transition">Set up retargeting ads (if budget allows)</span>
                    </label>
                </div>
            </div>

            <div class="mt-8 p-4 bg-gray-50 rounded-xl">
                <div class="flex justify-between items-center mb-2">
                    <span class="font-semibold">Progress:</span>
                    <span class="font-bold text-indigo-600" id="progress">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div id="progressBar" class="bg-gradient-to-r from-indigo-500 to-purple-500 h-3 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateProgress() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const checked = document.querySelectorAll('input[type="checkbox"]:checked');
            const percent = Math.round((checked.length / checkboxes.length) * 100);
            document.getElementById('progress').textContent = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
        }

        document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', updateProgress);
        });
    </script>
</body>
</html>
