<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freemium Conversion Calculator — Free to Paid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-gradient-to-br from-amber-500 via-orange-500 to-red-500 min-h-screen py-10 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-bold mb-2">🔄 Freemium Conversion Calculator</h1>
            <p class="opacity-90">See how free users convert to paid and optimize your funnel.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Free Users</label>
                    <input type="number" id="freeUsers" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" placeholder="1000" value="1000">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Paid Users</label>
                    <input type="number" id="paidUsers" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" placeholder="50" value="50">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Paid Plan Price ($/mo)</label>
                    <input type="number" id="price" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" placeholder="29" value="29">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Free User Cost ($/mo)</label>
                    <input type="number" id="freeCost" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500" placeholder="0.5" value="0.5">
                </div>
            </div>

            <button onclick="calculate()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-lg font-semibold hover:opacity-90 transition">Calculate Conversion →</button>

            <div id="output" class="mt-8 hidden">
                <div class="grid md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-amber-50 p-4 rounded-xl border-l-4 border-amber-500">
                        <div class="text-sm text-gray-600 mb-1">Conversion Rate</div>
                        <div class="text-2xl font-bold text-amber-700" id="conversion">0%</div>
                    </div>
                    <div class="bg-orange-50 p-4 rounded-xl border-l-4 border-orange-500">
                        <div class="text-sm text-gray-600 mb-1">Monthly Revenue</div>
                        <div class="text-2xl font-bold text-orange-700" id="revenue">$0</div>
                    </div>
                    <div class="bg-red-50 p-4 rounded-xl border-l-4 border-red-500">
                        <div class="text-sm text-gray-600 mb-1">Free User Cost</div>
                        <div class="text-2xl font-bold text-red-700" id="freeUserCost">$0</div>
                    </div>
                </div>

                <div id="assessment" class="p-4 rounded-xl mb-4"></div>

                <div class="bg-gray-50 p-4 rounded-xl">
                    <h3 class="font-semibold mb-3">Optimization Ideas:</h3>
                    <ul class="space-y-2 text-sm" id="ideas"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const freeUsers = parseFloat(document.getElementById('freeUsers').value) || 0;
            const paidUsers = parseFloat(document.getElementById('paidUsers').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const freeCost = parseFloat(document.getElementById('freeCost').value) || 0;

            const conversion = (paidUsers / (freeUsers + paidUsers)) * 100;
            const revenue = paidUsers * price;
            const totalFreeCost = freeUsers * freeCost;
            const netRevenue = revenue - totalFreeCost;

            document.getElementById('conversion').textContent = conversion.toFixed(1) + '%';
            document.getElementById('revenue').textContent = '$' + revenue.toLocaleString();
            document.getElementById('freeUserCost').textContent = '$' + totalFreeCost.toLocaleString();

            const assessment = document.getElementById('assessment');
            if (conversion >= 5) {
                assessment.className = 'bg-green-50 p-4 rounded-xl border-l-4 border-green-500';
                assessment.innerHTML = '<strong class="text-green-700">✅ Strong:</strong> Your freemium funnel is converting well. Industry avg is 2-5%.';
            } else if (conversion >= 2) {
                assessment.className = 'bg-yellow-50 p-4 rounded-xl border-l-4 border-yellow-500';
                assessment.innerHTML = '<strong class="text-yellow-700">⚠️ Average:</strong> You\'re at industry average. There\'s room to optimize.';
            } else {
                assessment.className = 'bg-red-50 p-4 rounded-xl border-l-4 border-red-500';
                assessment.innerHTML = '<strong class="text-red-700">❌ Low:</strong> Your conversion is below average. Focus on activation and upgrade triggers.';
            }

            document.getElementById('ideas').innerHTML = `
                <li>• At ${conversion.toFixed(1)}% conversion, you need ${Math.ceil(100/conversion)} free users for 1 paid user.</li>
                <li>• If you improve conversion by 1%, you'd gain $${(freeUsers * 0.01 * price).toFixed(0)} more MRR.</li>
                <li>• Your net revenue after free user costs: $${netRevenue.toLocaleString()}.</li>
                <li>• Consider adding paywalls to your most-used free features to drive upgrades.</li>
            `;

            document.getElementById('output').classList.remove('hidden');
        }
    </script>
</body>
</html>
