<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Net Dollar Retention Calculator — Revenue Expansion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f8fafc;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 32px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .result {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            margin-top: 24px;
            display: none;
        }
        .result.active {
            display: block;
        }
        .result-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }
        .result-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-detail {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .cta {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        @media (max-width: 600px) {
            .container { padding: 24px; }
            .result-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SaaS Net Dollar Retention Calculator</h1>
        <p class="subtitle">Do existing customers grow or shrink?</p>

        <div class="input-group">
            <label>Revenue from Cohort at Start ($)</label>
            <input type="number" id="startRev" placeholder="10000" value="10000">
        </div>

        <div class="input-group">
            <label>Revenue from Same Cohort Now ($)</label>
            <input type="number" id="endRev" placeholder="12000" value="12000">
        </div>

        <button class="cta" onclick="calculate()">Calculate NDR</button>

        <div class="result" id="result">
            <div class="result-label">Net Dollar Retention</div>
            <div class="result-value" id="ndr">0%</div>
            <div class="result-detail" id="detail"></div>
        </div>
    </div>

    <script>
        function calculate() {
            const start = parseFloat(document.getElementById('startRev').value) || 1;
            const end = parseFloat(document.getElementById('endRev').value) || 0;

            const ndr = (end / start) * 100;

            document.getElementById('ndr').textContent = ndr.toFixed(1) + '%';
            document.getElementById('detail').textContent = 
                (ndr >= 120 ? 'Excellent — strong expansion' : 
                 ndr >= 110 ? 'Good — solid growth' : 
                 ndr >= 100 ? 'Stable — flat revenue' : 
                 'Declining — contraction problem');
            document.getElementById('result').classList.add('active');
        }
    </script>
</body>
</html>
